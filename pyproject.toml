[project]
name = "mario-ppo"
version = "0.1.0"
description = "PPO training scaffold for SuperMarioBros-Nes-v0 with stable-retro-apple-silicon"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
    "stable-retro-apple-silicon==0.9.9.post2",
    "stable-baselines3[extra]>=2.3,<3",
    "tensorboard>=2.16,<3",
    "wandb>=0.18,<0.23",
]

[project.scripts]
mario-ppo-train = "mario_ppo.train:main"
mario-ppo-evaluate = "mario_ppo.evaluate:main"
mario-ppo-play = "mario_ppo.play:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mario_ppo"]

[tool.uv]
exclude-newer = "7 days"
constraint-dependencies = [
    "mistralai!=2.4.6",
    "guardrails-ai!=0.10.1",
]

[tool.ruff]
line-length = 100
target-version = "py311"
