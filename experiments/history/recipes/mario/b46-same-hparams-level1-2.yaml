schema_version: 1
kind: train_recipe
slug: b46-same-hparams-level1-2
algorithm: PPO
description: Historical B46/B44-style Level1-2 teacher recipe, normalized for queue-backed post21 specs.
env:
  game: SuperMarioBros-Nes-v0
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
train:
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.00015
  learning_rate_schedule_timesteps: 1
  ent_coef: 0.01
  ent_coef_final: 0.0003
  ent_coef_schedule_timesteps: 2000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.2
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
reward:
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 0.0
  reward_scale: 10
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
logging:
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
