# Recipe schema version; lets validators evolve recipe structure deliberately.
schema_version: 1
# Document kind; distinguishes reusable recipes from launch specs and goal contracts.
kind: train_recipe
# Stable recipe slug; used by specs and evidence records to refer to this hyperparameter bundle.
slug: b55-lowkl-lrdecay
# Learning algorithm family; keeps this recipe tied to PPO-specific knobs.
algorithm: PPO
# Short operator description; explains why this recipe exists without reading every field.
description: Current reusable B55 low-KL late-decay Mario PPO recipe.
# Environment fragment; shared by specs that compose this recipe before adding goal-specific state.
environment:
  # Fully-qualified environment id; materializes to the runner's game argument.
  env_id: stable-retro-turbo:SuperMarioBros-Nes-v0
  # Action-space fragment; defines which controller buttons the policy can emit.
  action:
    # Named action set from the target; simple keeps the Mario action space small and comparable.
    action_set: simple
  # Observation preprocessing fragment; defines the reusable policy input shape.
  preprocessing:
    # Emulator frame skip; fixes action repeat and observation cadence.
    frame_skip: 4
    # Whether to max-pool adjacent frames; false matches the current native-vector Mario contract.
    max_pool_frames: false
    # Resize target as [height, width]; canonical identity field for policy input resolution.
    obs_resize: [84, 84]
    # Crop as [top, right, bottom, left]; removes the HUD while staying provider-agnostic.
    obs_crop: [32, 0, 0, 0]
  # Episode termination fragment; defines reusable attempt boundaries.
  termination:
    # Hard per-episode cap; prevents stuck episodes from consuming unbounded rollout time.
    max_episode_steps: 4500
    # X-position threshold for completion logic; 0 means rely on configured info events here.
    # Info-event extraction rules; converts emulator info changes into named events.
    info_events_json:
      # Life-loss event source; used to end attempts on death.
      life_loss: [lives, decrease]
      # Level-change event source; used as the clear/completion boundary.
      level_change: [[levelHi, levelLo], change]
    # Events that terminate an attempt; fixes rolling completion denominators.
    done_on_events: [life_loss, level_change]
  # Reward-shaping fragment; defines the reusable B55 reward contract.
  reward:
    # Reward mode; score uses game score/progress shaping rather than raw retro reward.
    reward_mode: score
    # Bonus at terminal success; encourages completing the level once the event fires.
    terminal_reward: 50
    # Penalty on death; discourages policies that trade progress for frequent deaths.
    death_penalty: 25
    # Reward scale; keeps reward magnitudes in the range expected by this PPO recipe.
    reward_scale: 10
# PPO/training hyperparameters; these alter learning, not environment identity.
train:
  # Number of parallel envs; sets rollout throughput and batch diversity.
  n_envs: 16
  # Environment worker threads; balances native-vector env throughput against CPU contention.
  env_threads: 4
  # Torch intra-op threads; keeps PPO updates from oversubscribing CPU cores.
  torch_num_threads: 1
  # Rollout steps per env before each PPO update; controls horizon and batch cadence.
  n_steps: 512
  # Minibatch size; controls gradient estimate size during PPO optimization.
  batch_size: 512
  # PPO epochs per rollout; controls update pressure on each collected batch.
  n_epochs: 10
  # Initial learning rate; tuned for the B55 low-KL recipe.
  learning_rate: 0.00015
  # Final learning rate; late decay reduces update pressure near convergence.
  learning_rate_final: 0.0001
  # Decay horizon for learning rate; spreads the schedule over most of the 5M-step run.
  learning_rate_schedule_timesteps: 4000000
  # Initial entropy coefficient; encourages exploration early in training.
  ent_coef: 0.01
  # Final entropy coefficient; reduces exploration pressure once the policy has found clears.
  ent_coef_final: 0.0001
  # Decay horizon for entropy; keeps exploration high early and low late.
  ent_coef_schedule_timesteps: 4000000
  # Discount factor; gamma=0.9 emphasizes near-term Mario progress and completion signals.
  gamma: 0.9
  # GAE lambda; 1.0 keeps advantage estimates long-horizon under the chosen gamma.
  gae_lambda: 1.0
  # PPO clip range; limits policy update size for stability.
  clip_range: 0.15
  # KL guardrail; stops overly large PPO updates within an optimization epoch.
  target_kl: 0.16
  # Value loss coefficient; weights critic learning strongly enough for this reward scale.
  vf_coef: 1.0
  # Adam epsilon; preserves the historical optimizer behavior of this recipe.
  adam_eps: 0.00000001
  # Advantage normalization toggle; false preserves the confirmed B55 update behavior.
  normalize_advantage: false
# Logging and artifact defaults; these make composed specs queue-ready.
logging:
  # In-loop eval cadence; 0 disables trainer-side eval because promotion eval is out of process.
  eval_freq: 0
  # In-loop eval episode count; 0 pairs with eval_freq=0 to keep training eval-free.
  eval_episodes: 0
  # Checkpoint cadence; uploads intermediate policies for later independent eval/playback.
  checkpoint_freq: 500000
  # Total training budget; matches the active Mario goal cap.
  timesteps: 5000000
  # W&B enable flag; required so metrics and artifacts are auditable.
  wandb: true
  # W&B mode; online publishes evidence to the shared project in real time.
  wandb_mode: online
  # Artifact storage URI; externalized so specs do not commit bucket secrets.
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
