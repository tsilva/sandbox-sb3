schema_version: 1
kind: train_recipe
slug: b55-lowkl-lrdecay
algorithm: PPO
description: Current reusable B55 low-KL late-decay Mario PPO recipe.
env:
  game: SuperMarioBros-Nes-v0
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss: [lives, decrease]
    level_change: [[levelHi, levelLo], change]
  done_on_events: [life_loss, level_change]
train:
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.0001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 0.00000001
  normalize_advantage: false
reward:
  reward_mode: score
  terminal_reward: 50
  death_penalty: 25
  reward_scale: 10
logging:
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
