schema_version: 1
goal: Level1-3
slug: b239-b191resume-200k-longcredit5000-l13-screen
stage: screen
hypothesis: Previous 5000-bonus forks were unstable without B230's longer credit settings. B239 tests whether gamma=0.997 and gae_lambda=0.99 make the larger completion_reward=5000 useful for crossing and preserving the Level1-3 bottleneck.
expected_signal: Seed 80 should beat the 0.13 peak or produce a higher max clean count than B230. If final completion rate collapses, high completion bonus remains too aggressive even with longer credit.
parent_spec_slug: b230-b191resume-200k-longcredit4500-l13-screen
priority: 37
