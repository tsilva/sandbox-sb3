stage: screen
hypothesis: B191's best window was observed between the 200k and 300k checkpoints. B206 resumes the later 300k checkpoint with the same freeze-style low-update settings as B204, testing whether the policy after the peak is a better starting point for stability.
expected_signal: Seed 80 should recover or exceed B191's 0.12 peak within the remaining 300k steps. If it starts lower than B204, the 300k checkpoint is already past the useful window.
