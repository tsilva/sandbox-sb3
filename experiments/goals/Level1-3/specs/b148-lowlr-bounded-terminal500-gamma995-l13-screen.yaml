schema_version: 1
goal: Level1-3
slug: b148-lowlr-bounded-terminal500-gamma995-l13-screen
stage: screen
hypothesis: B143/B144/B145 all crossed the 2M checkpoint with zero clean Level1-3 clears, while the low-LR/high-entropy B146/B147 arms are still too young to judge. This arm combines the low-LR gamma=0.995 treatment with bounded reward, a small progress cap, and a much larger terminal signal to test whether score/progress-rich local optima are masking the sparse true clear objective.
expected_signal: Seed 80 should either produce nonzero train/info/level_complete/from/0-2/count or show whether bounded terminal reward plus long-horizon PPO still falls into the zero-clear plateau.
parent_spec_slug: b140-bounded-terminal150-longcredit-l13-screen
priority: 52
seeds:
- 80
run_target: rtx4090
wandb_group: b148-l13-lowlr-bounded-terminal500-gamma995-screen
wandb_tags:
- mario
- level1-3
- post21
- b148
- low-learning-rate
- bounded-reward
- terminal-reward-500
- gamma-0995
- long-rollout
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b148_l13_lowlr_bounded_terminal500_gamma995_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B143/B144/B145 zero-clear plateau backfill using reward_mode=bounded, terminal_reward=500, progress_reward_cap=5, reward_scale=10, lower LR 7e-5->4e-5, n_steps=2048, gamma=0.995, gae_lambda=0.97, ent_coef=0.03->0.005, normalize_advantage=true, and target_kl=0.12 to test long-horizon sparse terminal credit without score-mode local optima. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 2048
  batch_size: 1024
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 4.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.03
  ent_coef_final: 0.005
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.995
  gae_lambda: 0.97
  clip_range: 0.15
  target_kl: 0.12
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: bounded
  progress_reward_cap: 5.0
  progress_reward_scale: 1.0
  terminal_reward: 500
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 0.0
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
