schema_version: 1
goal: Level1-3
slug: b142-ultralowdeath-tinyprogress-complete250-l13-screen
stage: screen
hypothesis: B137's tiny-progress/high-completion arm escaped the constant death-penalty plateau but still produced zero clean Level1-3 clears by the 2M checkpoint, with death still dominating reward attribution. Lowering death pressure, making the true clear bonus much larger, keeping only a tiny progress gradient, and preserving a high entropy floor should encourage exploration toward the clean level transition instead of settling into survival/death tradeoffs.
expected_signal: Seed 80 should reduce death-share dominance relative to B137 and ideally produce the first nonzero train/info/level_complete/from/0-2/count.
parent_spec_slug: b137-tinyprogress-highentropy-complete150-l13-screen
priority: 58
seeds:
- 80
run_target: rtx4090
wandb_group: b142-l13-ultralowdeath-tinyprogress-complete250-screen
wandb_tags:
- mario
- level1-3
- post21
- b142
- ultra-low-death
- tiny-progress-scale
- completion-reward-250
- long-rollout
- gamma-097
- advantage-normalization
- high-entropy-floor
- screen
- beast3
run_name_template: b142_l13_ultralowdeath_tinyprogress_complete250_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B137 zero-clear follow-up using progress_reward_scale=0.05, death_penalty=10, completion_reward=250, n_steps=1024, gamma=0.97, gae_lambda=0.95, normalize_advantage=true, and ent_coef_final=0.005 to reduce death-dominated stagnation while strongly rewarding the true clean clear. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 1024
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.005
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.97
  gae_lambda: 0.95
  clip_range: 0.15
  target_kl: 0.14
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.05
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 10
  completion_reward: 250
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
