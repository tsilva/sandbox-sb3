schema_version: 1
goal: Level1-3
slug: b145-b55baseline-terminal300-l13-screen
stage: screen
hypothesis: B140's bounded reward and B141's long-credit advantage-normalized baseline arm test non-score rewards, but the confirmed Level1-1 recipe uses short-credit PPO without advantage normalization. This arm combines B55 PPO pressure with baseline/native-score reward and a stronger terminal level-change versus death signal.
expected_signal: Seed 80 should produce a different learning curve from the score-mode progress plateaus and ideally a first nonzero train/info/level_complete/from/0-2/count.
parent_spec_slug: b141-baseline-terminal250-longcredit-l13-screen
priority: 55
seeds:
- 80
run_target: rtx4090
wandb_group: b145-l13-b55baseline-terminal300-screen
wandb_tags:
- mario
- level1-3
- post21
- b145
- b55-transfer
- baseline-reward
- terminal-reward-300
- no-advantage-normalization
- screen
- beast3
run_name_template: b145_l13_b55baseline_terminal300_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B140/B141 follow-up using B55 short-credit PPO with reward_mode=baseline, terminal_reward=300, reward_scale=10, gamma=0.9, gae_lambda=1.0, normalize_advantage=false, and target_kl=0.16 to test native/score plus stronger terminal objective without direct x-progress shaping. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.0001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: baseline
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 300
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 0.0
  reward_scale: 10
  score_progress_clipped: false
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
