schema_version: 1
goal: Level1-3
slug: b223-b214erepeatresume-100k-soften4000-l13-screen
stage: screen
hypothesis: B214 repeat 6nmufrl0 is one of the strongest B214 parents by peak and final window. B223 resumes that parent at 100k and softens completion_reward to 4000, testing whether post-discovery reward softening works better from a stronger B214 repeat than from the first B214 parent.
expected_signal: Seed 80 should preserve a better final train/info/level_complete/rate/min/last than the parent B214 repeat or B221. If it loses the 0.13 behavior, post-discovery softening is not the right stabilizer.
parent_spec_slug: b214-b191resume-200k-freezemid4500-l13-screen
priority: 36
