run_name_template: b192_l13_b178resume_1400k_clearboost5000_s{seed}_{utc}
run_description_template: Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B178 step-1400000, equivalent to about 4.4M total B166+B178 steps, leaving 600k under the 5M cap. Uses completion_reward=5000 and conservative continuation settings LR 1e-5->5e-6, ent_coef=0.001->0.0005, n_epochs=6, batch_size=4096, clip_range=0.05, clip_range_vf=0.3, target_kl=0.03.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b178_l13_b166resume_3000k_stablediscovery_complete3000_s80_20260628T175445Z/checkpoints/ppo_supermariobros-nes-v0_1400000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 6
  learning_rate: 1.0e-05
