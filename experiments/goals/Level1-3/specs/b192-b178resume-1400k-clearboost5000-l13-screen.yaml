hypothesis: B192 pairs the earliest B178 checkpoint in this saturation batch, 1.4M, with the stronger completion_reward=5000 clearboost. It tests whether a longer 600k post-discovery consolidation window can make the sparse clear bonus stick without the late-window decay seen in B178/B184/B185.
expected_signal: Seed 80 should exceed the B178 observed 0.06 high-water or maintain a better final rolling rate. If it increases shaped reward without completion-rate improvement, 5000 clearboost is not enough.
