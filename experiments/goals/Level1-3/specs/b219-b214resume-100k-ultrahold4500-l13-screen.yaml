run_name_template: b219_l13_b214resume_100k_ultrahold4500_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B214 first run step-100000, equivalent to about 4.7M total B166+B178+B191+B214 steps, leaving 300k under the 5M cap. Keeps completion_reward=4500 and uses ultra-hold PPO settings: LR 2e-6->5e-7, ent_coef=0.0002->0.00002, n_epochs=2, batch_size=4096, clip_range=0.015, clip_range_vf=0.1, target_kl=0.01. Primary metric is peak train/info/level_complete/rate/min/last.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
