schema_version: 1
goal: Level1-3
slug: b225-b224a50k-ultrahold4500-l13-screen
stage: screen
hypothesis: B224 dense-checkpoint repeats reproduced the B214 high-window band but did not beat 0.13. B224a peaked at 0.12 with the best completed clean count among B224 runs, and its 50k checkpoint is before the observed 78k-83k peak. B225 resumes B224a at 50k with an ultra-low-update hold schedule to test whether the pre-peak policy can be guided into the high window without later collapse.
expected_signal: Seed 80 should exceed the B224a 0.12 peak or preserve a stronger final train/info/level_complete/rate/min/last than B214/B224. If it stays below 0.12, the 50k pre-peak checkpoint is not enough without a different stabilizer.
parent_spec_slug: b224-b191resume-200k-freezemid4500-ckpt50k-l13-screen
priority: 39
seeds:
- 80
run_target: rtx4090
wandb_group: b225-l13-b224a50k-ultrahold4500-screen
wandb_tags:
- mario
- level1-3
