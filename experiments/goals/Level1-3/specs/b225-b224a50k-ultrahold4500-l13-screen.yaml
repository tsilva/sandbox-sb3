run_name_template: b225_l13_b224a50k_ultrahold4500_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B224a step-50000, equivalent to about 4.65M total B166+B178+B191+B224 steps, leaving 350k under the 5M cap. Keeps completion_reward=4500 and uses ultra-hold PPO settings: LR 2e-6->5e-7, ent_coef=0.0002->0.00002, n_epochs=2, batch_size=4096, clip_range=0.015, clip_range_vf=0.1, target_kl=0.01. Primary metric is peak train/info/level_complete/rate/min/last.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b224_l13_b191resume_200k_freezemid4500_ckpt50k_s80_20260628T194856Z/checkpoints/ppo_supermariobros-nes-v0_50000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 2
  learning_rate: 2.0e-06
  learning_rate_final: 5.0e-07
  learning_rate_schedule_timesteps: 350000
  ent_coef: 0.0002
  ent_coef_final: 2.0e-05
  ent_coef_schedule_timesteps: 350000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.015
  clip_range_vf: 0.1
  target_kl: 0.01
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 4500
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
