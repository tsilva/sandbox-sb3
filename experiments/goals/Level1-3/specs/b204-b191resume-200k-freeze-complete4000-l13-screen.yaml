schema_version: 1
goal: Level1-3
slug: b204-b191resume-200k-freeze-complete4000-l13-screen
stage: screen
hypothesis: B191 is the current best Level1-3 training signal, peaking at 0.12 around 250k continuation steps before decaying to 0.07. B204 resumes B191 at 200k and freezes the policy more gently with lower LR, entropy, clip, and KL while keeping completion_reward=4000, testing whether the high-clear window can be preserved and widened under the remaining 400k cap.
expected_signal: Seed 80 should beat B191's 0.12 peak train/info/level_complete/rate/min/last or sustain a higher final window. If it only preserves reward without completion-rate improvement, the B191 window is not stabilized by smaller PPO updates.
parent_spec_slug: b191-b178resume-1400k-clearboost4000-l13-screen
priority: 31
seeds:
- 80
run_target: rtx4090
wandb_group: b204-l13-b191resume-200k-freeze-complete4000-screen
wandb_tags:
- mario
- level1-3
- post21
- b204
- b191-resume
- checkpoint-200000
- critic-wide
- freeze
- completion-reward-4000
