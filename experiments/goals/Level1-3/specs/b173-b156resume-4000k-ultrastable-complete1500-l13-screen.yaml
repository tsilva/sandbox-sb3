run_name_template: b173_l13_b156resume_4000k_ultrastable_complete1500_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 mounted checkpoint fork for Level1-3 100/100, seed {seed}; resumes the B156 step-4000000 checkpoint, which had crossed the x bottleneck while leaving 1M train steps under the 5M cap. Preserves B156 reward and architecture with policy_net_arch=64,64, value_net_arch=512,512, gamma=0.995, gae_lambda=0.98, normalize_advantage=true, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, completion_reward=1500, time_penalty=-0.002, but uses ultra-stable continuation settings: LR 1e-5->5e-6, ent_coef=0.001->0.0, n_epochs=4, batch_size=2048, clip_range=0.06, clip_range_vf=0.1, target_kl=0.03. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b156_l13_lowlr_criticwide_tinyprogress_complete1500_s80_20260628T151901Z/checkpoints/ppo_supermariobros-nes-v0_4000000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 2048
  n_epochs: 4
  learning_rate: 1.0e-05
  learning_rate_final: 5.0e-06
  learning_rate_schedule_timesteps: 1000000
  ent_coef: 0.001
  ent_coef_final: 0.0
  ent_coef_schedule_timesteps: 1000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.06
  clip_range_vf: 0.1
  target_kl: 0.03
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
