hypothesis: B191 and B205 both reached 0.12 but decayed, and larger completion bonuses can lift shaped reward without a durable clear window. B215 resumes B191 at 200k with a softer completion_reward=3500 using the B205 stable PPO shape, testing whether less sparse-clear pressure preserves the platforming behavior after the initial bottleneck.
expected_signal: Seed 80 should sustain a better final rolling completion window than B191/B205 while remaining competitive on peak train/info/level_complete/rate/min/last. If peak and count fall together, the softer bonus is under-reinforcing clean clears.
