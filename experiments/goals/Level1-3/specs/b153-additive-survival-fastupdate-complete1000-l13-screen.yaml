schema_version: 1
goal: Level1-3
slug: b153-additive-survival-fastupdate-complete1000-l13-screen
stage: screen
hypothesis: B148's bounded reward arm crossed 2M steps with zero clean Level1-3 clears and a death-dominated negative reward plateau. Bounded reward ties the clear bonus and death penalty together, which appears too harsh for Level1-3 exploration. This arm removes score reward, keeps only a tiny progress gradient, adds the small survival-bonus proxy from B151, keeps death pressure low, and uses B152-style frequent PPO updates to test patient jump timing without the bounded-mode death cliff.
expected_signal: Seed 80 should either produce nonzero train/info/level_complete/from/0-2/count or show whether additive low-death survival shaping also stalls before the first safe Level1-3 jump.
parent_spec_slug: b151-lowlr-survival-minprogress-complete1000-l13-screen
priority: 47
seeds:
- 80
run_target: rtx4090
wandb_group: b153-l13-additive-survival-fastupdate-complete1000-screen
wandb_tags:
- mario
- level1-3
- post21
- b153
- additive-reward
- survival-bonus
- fast-updates
- death-penalty-light
- minimal-progress-scale
- completion-reward-1000
- gamma-0995
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b153_l13_additive_survival_fastupdate_complete1000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B148 zero-clear bounded-reward plateau backfill using additive reward, n_steps=512, batch_size=512, LR 5e-5->3e-5, gamma=0.995, gae_lambda=0.98, ent_coef=0.05->0.01, normalize_advantage=true, target_kl=0.10, progress_reward_scale=0.01, death_penalty=2, completion_reward=1000, and time_penalty=-0.005 to test low-death survival shaping without score reward or bounded-mode terminal death. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 5.0e-05
  learning_rate_final: 3.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.05
  ent_coef_final: 0.01
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.15
  target_kl: 0.1
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: additive
  progress_reward_cap: 30.0
  progress_reward_scale: 0.01
  terminal_reward: 50
  time_penalty: -0.005
  death_penalty: 2
  completion_reward: 1000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
