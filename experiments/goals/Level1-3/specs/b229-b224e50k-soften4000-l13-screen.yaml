schema_version: 1
goal: Level1-3
slug: b229-b224e50k-soften4000-l13-screen
stage: screen
hypothesis: B224e was the best dense-checkpoint parent by late-window signal. B229 resumes B224e at 50k and softens completion_reward to 4000, pairing the best B224 parent with the post-discovery softening hypothesis.
expected_signal: Seed 80 should preserve a stronger final rolling completion window than B224e/B226 while remaining near the 0.12 peak. If it loses both peak and final rate, softening is rejected for the B224e parent too.
parent_spec_slug: b224-b191resume-200k-freezemid4500-ckpt50k-l13-screen
priority: 38
seeds:
- 80
run_target: rtx4090
wandb_group: b229-l13-b224e50k-soften4000-screen
wandb_tags:
- mario
- level1-3
