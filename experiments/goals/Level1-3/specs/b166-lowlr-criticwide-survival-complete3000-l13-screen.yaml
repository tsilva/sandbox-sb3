schema_version: 1
goal: Level1-3
slug: b166-lowlr-criticwide-survival-complete3000-l13-screen
stage: screen
hypothesis: B156 was the first active Level1-3 screen to produce real clean completions, but it never formed a reliable 100/100 rolling window before the 5M cap. B165 tests whether removing the small survival incentive and adding anti-stall pressure improves that first-clear recipe. This narrower ablation keeps B156's critic-wide architecture, low-pressure PPO, entropy schedule, tiny clipped progress signal, and small survival incentive intact, changing only the true clean-clear bonus from 1500 to 3000 to test whether B156 simply underweighted the sparse completion event.
expected_signal: Seed 80 should preserve B156's nonzero clean-clear discovery while improving peak train/info/level_complete/from/0-2/rate or increasing completion count earlier. If it does not improve over B156, the issue is not just sparse-clear bonus magnitude.
parent_spec_slug: b156-lowlr-criticwide-tinyprogress-complete1500-l13-screen
priority: 34
seeds:
- 80
run_target: rtx4090
wandb_group: b166-l13-lowlr-criticwide-survival-complete3000-screen
wandb_tags:
- mario
- level1-3
- post21
- b166
- low-learning-rate
- critic-wide
- gentler-update-pressure
- tiny-clipped-progress
- survival-bonus
- completion-reward-3000
- gamma-0995
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b166_l13_lowlr_criticwide_survival_complete3000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; narrow B156 first-clear follow-up using policy_net_arch=64,64, value_net_arch=512,512, LR 7e-5->5e-5, n_steps=1024, batch_size=1024, gamma=0.995, gae_lambda=0.98, ent_coef=0.05->0.005, normalize_advantage=true, clip_range=0.12, clip_range_vf=0.2, target_kl=0.12, vf_coef=0.5, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, completion_reward=3000, and time_penalty=-0.002. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 1024
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 5.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.05
  ent_coef_final: 0.005
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.12
  clip_range_vf: 0.2
  target_kl: 0.12
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 3000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
