run_name_template: b170_l13_b156resume_direct_clearboost4500k_s{seed}_{utc}
run_description_template: Single-seed Beast3 direct checkpoint fork for Level1-3 100/100, seed {seed}; resumes the locally staged B156 step-4500000 checkpoint, which reached eval max_x=1645 and started clean Level1-3 clears. Runs only 500k additional steps to keep total exposure aligned with the 5M cap. Keeps B156 architecture and reward shape but raises completion_reward from 1500 to 3000 while using LR 3e-5->2e-5, ent_coef=0.005->0.002, n_steps=1024, batch_size=1024, gamma=0.995, gae_lambda=0.98, normalize_advantage=true, clip_range=0.12, clip_range_vf=0.2, target_kl=0.10, vf_coef=0.5, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, and time_penalty=-0.002. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/artifacts/train_resumes/b156_step4500000/ppo_supermariobros-nes-v0_4500000_steps.zip
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 1024
  n_epochs: 10
  learning_rate: 3.0e-05
  learning_rate_final: 2.0e-05
  learning_rate_schedule_timesteps: 500000
  ent_coef: 0.005
  ent_coef_final: 0.002
  ent_coef_schedule_timesteps: 500000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.12
  clip_range_vf: 0.2
  target_kl: 0.1
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 3000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 100000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 500000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
