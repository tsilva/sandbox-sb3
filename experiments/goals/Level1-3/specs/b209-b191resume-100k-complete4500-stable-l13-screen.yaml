run_name_template: b209_l13_b191resume_100k_complete4500_stable_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B191 step-100000, equivalent to about 4.5M total B166+B178+B191 steps, leaving 500k under the 5M cap. Uses completion_reward=4500 and stable PPO continuation: LR 8e-6->3e-6, ent_coef=0.001->0.0003, n_epochs=5, batch_size=4096, clip_range=0.04, clip_range_vf=0.25, target_kl=0.025. Primary metric is peak train/info/level_complete/rate/min/last.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b191_l13_b178resume_1400k_clearboost4000_s80_20260628T183624Z/checkpoints/ppo_supermariobros-nes-v0_100000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 5
  learning_rate: 8.0e-06
  learning_rate_final: 3.0e-06
  learning_rate_schedule_timesteps: 500000
  ent_coef: 0.001
  ent_coef_final: 0.0003
  ent_coef_schedule_timesteps: 500000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.04
