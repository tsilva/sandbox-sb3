schema_version: 1
goal: Levels_2_d25102
slug: b86-b74current-l11l12-latest-five-seed
stage: confirm
hypothesis: The B74/B84-style Level1-1/Level1-2 50/50 task-conditioned PPO recipe should reproduce balanced mixed-level completion on the latest digest-backed train image.
expected_signal: Rank by the weaker of Level1-1 and Level1-2 rolling completion, using mean reward only as a tie-breaker after per-level completion.
parent_spec_slug: b84-l11l12-b74current
priority: 70
seeds:
- 193
- 194
- 195
- 196
- 197
run_target: rtx4090
wandb_group: b86-l11l12-b74current-latest-five-seed
wandb_tags:
- mario
- level1-1
- level1-2
- mixed-level
- b74-style
- b86
- latest-image
- task-conditioning
- per-task-advantage
- beast3
run_name_template: b86_l11l12_b74current_s{seed}_{utc}
run_description_template: Five-seed Beast3 profileless B74/B84-style SuperMarioBros-NES Level1-1/Level1-2 50/50 task-conditioned PPO on the latest digest-backed train image, seed {seed}; balanced objective is min per-level completion.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: Primary metric to maximize; use train/info/level_complete/rate/mean/last as a companion signal and external eval for promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - train/info/level_complete/from/0-0/rate
  - train/info/level_complete/from/0-1/rate
  - train/reward/mean
  training_metrics: diagnostic_until_out_of_process_eval
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-1
  states:
  - Level1-1
  - Level1-2
  state_probs:
  - 0.5
  - 0.5
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.00015
  learning_rate_schedule_timesteps: 1
  ent_coef: 0.01
  ent_coef_final: 0.0003
  ent_coef_schedule_timesteps: 2000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  clip_range_vf: 0.2
  target_kl: 0.2
  vf_coef: 0.5
  adam_eps: 1.0e-08
  normalize_advantage: false
  advantage_normalization: per-task
  policy_net_arch: 64,64
  value_net_arch: 512,512
  reward_mode: score
  terminal_reward: 50
  death_penalty: 25
  reward_scale: 10
  score_progress_clipped: true
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  task_conditioning: true
  task_conditioning_info_vars:
  - levelHi
  - levelLo
  task_conditioning_info_values:
  - - 0
    - 0
  - - 0
    - 1
  - - 0
    - 2
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
