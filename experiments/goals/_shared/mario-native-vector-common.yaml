# Contract schema version; lets validators evolve the goal format deliberately.
schema_version: 1
# Lifecycle state of the shared contract; active means goal overlays may inherit it.
status: active
# Objective fields define what training is trying to optimize, independent of launch mechanics.
objective:
  # Stable Retro game id; keeps the objective tied to the ROM/environment family.
  game: SuperMarioBros-Nes-v0
  # Learning algorithm family; keeps recipes comparable under the same optimizer class.
  algorithm: PPO
  # Main training metric for ranking goals; min/last is the bottleneck clear rate.
  primary_metric: train/info/level_complete/rate/min/last
  # How to summarize the primary metric over a run; peak rewards learning progress even if later unstable.
  primary_metric_aggregation: peak_over_training_run
  # Companion bottleneck metric; guards against one source level hiding another source level's failure.
  balance_guard_metric: train/info/level_complete/rate/min/last
  # Default training budget ceiling; bounds comparisons and avoids open-ended searches.
  max_train_timesteps: 5000000
# Environment identity captures the MDP interface the policy acts in; it is hashed for exact comparisons.
environment:
  # Backend environment provider; needed because env ids are only meaningful within a provider.
  provider: stable_retro
  # Provider environment id; this is materialized to the runner's game argument.
  env_id: SuperMarioBros-Nes-v0
  # Action-space configuration; determines which controller buttons the policy can emit.
  action:
    # Named action set from the target; simple keeps the Mario policy action space small and comparable.
    action_set: simple
  # Observation preprocessing; defines exactly what pixels/tensors the policy sees.
  preprocessing:
    # Preprocessing implementation path; distinguishes native vector observations from wrapper stacks.
    pipeline: stable_retro_native_vec_env
    # Emulator frame skip; fixes action repeat and observation cadence.
    frame_skip: 4
    # Number of frames in the policy observation stack; preserves motion information.
    frame_stack: 4
    # Whether to max-pool adjacent frames; false matches the current native-vector Mario contract.
    max_pool_frames: false
    # Random sticky action probability; 0 disables stochastic action repetition for this contract.
    sticky_action_prob: 0.0
    # Resize target as [height, width]; canonical identity field for policy input resolution.
    obs_resize:
    - 84
    - 84
    # Crop as [top, right, bottom, left]; removes the HUD while staying provider-agnostic.
    obs_crop:
    - 32
    - 0
    - 0
    - 0
    # Whether observations are grayscale; fixes channel semantics before frame stacking.
    obs_grayscale: true
    # Resize kernel; area downsampling is the expected image resizer for this contract.
    obs_resize_algorithm: area
    # Whether the vector env copies observation buffers; false avoids unnecessary memory traffic.
    copy_observations: false
    # Tensor layout expected by the policy; channel_first matches SB3 CNN inputs.
    policy_observation_layout: channel_first
  # Episode termination semantics; defines what counts as an attempt boundary.
  termination:
    # Hard per-episode cap; prevents stuck runs from consuming unbounded rollout time.
    max_episode_steps: 4500
    # X-position threshold for completion logic; 0 means rely on configured info events here.
    completion_x_threshold: 0
    # Info-event extraction rules; converts emulator info changes into named events.
    info_events_json:
      # Life-loss event source; used to end attempts on death.
      life_loss:
      - lives
      - decrease
      # Level-change event source; used as the clear/completion boundary.
      level_change:
      - - levelHi
        - levelLo
      - change
    # Events that terminate an attempt; fixes the denominator for rolling completion metrics.
    done_on_events:
    - life_loss
    - level_change
# Non-objective constraints that keep launches comparable and auditable.
constraints:
  # Curriculum setting; none means each goal owns its source-state distribution directly.
  curriculum: none
  # Required env implementation path; prevents comparing native-vector results to wrapper paths.
  training_path: native_vector_env
  # W&B project namespace; keeps run discovery and reports in the expected place.
  wandb_project: SuperMarioBros-NES
  # Whether W&B logging is mandatory; required so promotion evidence is inspectable later.
  wandb_logging_required: true
  # Whether every launch must describe its intent; prevents anonymous or ambiguous experiments.
  run_description_required: true
# Runtime provenance expected for comparable launches.
runtime:
  # Stable Retro package version; important because env behavior and native-vector support can change.
  stable_retro_turbo: 1.0.0.post22
  # Runtime image policy; queue jobs should pin the exact trainer image digest.
  runtime_image_ref: digest-pinned GHCR train image from rlab-train-image.json
  # Python runtime family; documents the interpreter expected by the locked environment.
  python: '3.14'
  # Dependency lockfile; makes package resolution reproducible.
  dependency_lock: uv.lock
# Default train profile; null keeps queue-backed training profileless unless explicitly requested.
default_train_profile: null
# Rationale for null train profile; documents that runtime image digest, not profile id, owns immutability.
default_train_profile_note: Queue-backed launches are profileless by default; use the spec run_target plus a digest-pinned runtime image.
# Default eval profile; points independent eval workers at the expected CPU/vector lane.
default_eval_profile: mario-level1-eval/post22/vector-cpu
# Capacity policy file; centralizes host lane limits and scheduling rules.
capacity_policy_file: experiments/policies/capacity_policy.yaml
# Execution defaults for queue orchestration.
execution:
  # Queue manager implementation; identifies the system expected to launch and monitor jobs.
  queue_manager: rlab-fleet
  # Preferred training target class; routes comparable training to the intended GPU tier.
  primary_train_target: rtx4090
  # Preferred host name; documents the known-good machine for these Mario runs.
  primary_train_host: beast-3
  # Hardware inventory file; source of truth for GPU hosts and capacities.
  hardware_config_file: experiments/instances.yaml
  # Fleet config file; source of truth for queue workers and host routing.
  fleet_config_file: experiments/fleet.yaml
  # Manual launch warning; prevents uncontrolled extra trainers from contaminating comparisons.
  manual_trainers: Avoid ad hoc second trainers through sky exec, docker exec, or manual host shells for comparable runs.
# Determinism policy; separates normal training distribution from debug-only deterministic settings.
determinism:
  # Default reproducibility stance; avoids slowing or changing CUDA kernels in normal experiments.
  default: Measure the real training distribution. Do not enable deterministic CUDA flags by default because they can slow training and alter the optimizer/kernel path.
  # Optional deterministic debug recipe; use only when diagnosing reproducibility issues.
  debug_only:
    # Environment variables for deterministic CUDA paths; documented so such runs can be tagged.
    environment:
    - CUBLAS_WORKSPACE_CONFIG=:4096:8
    # Torch settings for deterministic diagnostics; these can alter performance and kernel choice.
    torch_settings:
    - torch.backends.cudnn.benchmark = False
    - torch.backends.cudnn.deterministic = True
    - torch.use_deterministic_algorithms(True, warn_only=True)
    # Caveat attached to debug determinism; keeps those runs from being mixed with normal evidence.
    note: If used, mark deterministic CUDA as a separate runtime condition.
