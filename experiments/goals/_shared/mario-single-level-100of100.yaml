# Hydra composition list; pulls in the common Mario environment/runtime contract before this overlay.
defaults:
# Shared base contract; keeps all single-level goals aligned on env identity and runtime rules.
- mario-native-vector-common@_global_
# Apply this file after the base; lets the 100/100 single-level policy override shared defaults.
- _self_
# Objective overlay for single-source 100/100 completion goals.
objective:
  # Required rolling completion threshold; 1.0 means every attempt in the window must clear.
  success_threshold: 1.0
  # Window size for success; 100 attempts makes the metric strict and comparable across seeds.
  success_window_attempts: 100
  # Stop rules that are explicitly disallowed; protects metric meaning from rollout-cadence artifacts.
  forbidden_stop_rules:
  - Do not use rollout-count completion stops because their meaning changes with n_envs, n_steps, and rollout cadence.
# Selection policy defines how candidates are ranked and promoted.
selection_policy:
  # Evidence source for ranking; training high-watermarks find candidates, eval confirms promotion.
  source: training_high_watermark_with_out_of_process_eval_confirmation
  # How training metrics are used; names them as optimization signals rather than final proof.
  training_metrics_use: primary_optimization_signal
  # Fixed budgets to inspect; reveal whether a candidate learns earlier or only at the cap.
  fixed_budget_completion_timesteps:
  - 2000000
  - 3000000
  - 4000000
  - 5000000
  # Promotion tiebreakers; enforce reliability and sample efficiency beyond the primary metric.
  confirmation_tie_breakers:
  - higher success count across confirmation seeds
  - lower median time_to_100_of_100
  - lower worst successful seed time
  - higher completion rate at fixed budgets
  - higher external checkpoint eval completion rate
# Budget policy for the family of single-level goals.
cap_policy:
  # Active training budget; the default maximum used by comparable candidate specs.
  active_cap_timesteps: 5000000
  # Ratchet rule; lowers future caps only when a confirmed baseline proves the lower budget.
  ratchet_rule: If a confirmed baseline succeeds on all confirmation seeds below the active cap, lower future caps to the slowest successful seed rounded up to the next 100k.
  # Cap increase rule; prevents budget creep unless the goal or infrastructure evidence changes.
  increase_rule: Do not increase the cap unless the goal changes or an infrastructure bug invalidates the baseline.
# Search protocol describes how to move from experiments to a baseline.
search_protocol:
  # Screening rule; explains when a candidate deserves more seeds.
  screen: Run screen seeds first. Reject obvious negatives. Advance candidates that reach the success window, materially improve fixed-budget completion metrics, or look promising enough to justify confirmation.
  # Confirmation rule; defines the evidence needed before replacing an incumbent.
  confirm: Promote only if success count is at least as good as the incumbent, median time_to_100_of_100 is better, there is no severe reliability regression, and all runs either stop by the success window or reach the cap.
  # Baseline definition; prevents lucky single runs from being treated as solved recipes.
  baseline_definition: A baseline is the best confirmed config, not the best single run. Single lucky runs generate hypotheses; they do not replace the baseline.
# Execution overlay for single-level searches.
execution:
  # Backfill rule; allows useful replacement jobs without filling the fleet with stale work.
  backfill_rule: Backfill finished slots only while the next queued run still has decision value.
# Expected report fields for batch records; keeps operator notes consistent across goals.
batch_record_fields:
- hypothesis
- config_delta
- stage
- active_cap
- seeds
- wandb_group
- runs
- aggregate
- decision
- baseline_update
# Operator notes that apply to all single-level 100/100 contracts.
notes:
- Use this file as the operator-facing current contract; goal-owned specs and recipe evidence live beside it under this goal directory.
- Do not promote a policy from final checkpoint reward alone.
- Prefer paired confirmation against the incumbent before declaring a new baseline.
