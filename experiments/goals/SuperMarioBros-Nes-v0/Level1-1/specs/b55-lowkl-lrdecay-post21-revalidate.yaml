defaults:
- ../_goal@goal
- _self_
slug: b55-lowkl-lrdecay-post21-revalidate
hypothesis: >-
  The B55 low-KL late-decay recipe remains a strong Level1-1 policy-search baseline under the active
  post21 runtime. Confirmation runs should either reach 100/100 terminal level-change windows or
  produce stronger eval-ranked checkpoints than the current incumbent evidence.
wandb_group: b82-l11-b55-post21-revalidate
wandb_tags:
- mario
- level1-1
- post21
- b55
- confirm
run_description_template: Post21 revalidation of the B55 low-KL late-decay Level1-1 recipe, confirm seed {seed}.
train:
  policy:
    torch_num_threads: 1
    n_steps: 512
    batch_size: 512
    n_epochs: 10
    learning_rate: 0.00015
    learning_rate_final: 0.0001
    learning_rate_schedule_timesteps: 4000000
    ent_coef: 0.01
    ent_coef_final: 0.0001
    ent_coef_schedule_timesteps: 4000000
    gamma: 0.9
    gae_lambda: 1.0
    clip_range: 0.15
    target_kl: 0.16
    vf_coef: 1.0
    adam_eps: 1.0e-08
    normalize_advantage: false
