schema_version: 1
goal: Levels_2_d25102
slug: b106-lowpress-complete50-slowent-l12soft-l11l12-two-seed
stage: screen
hypothesis: The strongest legal anti-collapse recipe not yet queued combines the true-clear signal from completion_reward=50, lower PPO update pressure, slower entropy decay, and soft Level1-2 coverage; this should test whether B89-style transient competence needs all three stabilizers to become reproducible across two seeds.
expected_signal: Both seeds should maximize peak train/info/level_complete/rate/min/last, with higher Level1-2 rolling clear rate than B105 and less post-peak collapse than B103/B104.
parent_spec_slug: b104-complete50-slowent-l12soft-l11l12-two-seed
priority: 57
seeds:
- 202
- 203
run_target: rtx4090
wandb_group: b106-l11l12-lowpress-complete50-slowent-l12soft-two-seed
wandb_tags:
- mario
- level1-1
- level1-2
- mixed-level
- b106
- low-update-pressure
- completion-reward-50
- slow-entropy-decay
- higher-entropy-floor
- soft-l12-sampling-bias
- task-conditioning
- per-task-advantage
- beast3
run_name_template: b106_l11l12_lowpress_complete50_slowent_l12soft_s{seed}_{utc}
run_description_template: Two-seed Beast3 search batch for Level1-1/Level1-2 mixed PPO high-watermark, seed {seed}; combines low PPO update pressure, completion_reward=50, slower entropy decay with higher floor, and 45/55 Level1-1/Level1-2 sampling, primary optimization metric is peak train/info/level_complete/rate/min/last; train/info/level_complete/rate/mean/last is a companion signal.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: Primary metric to maximize; use train/info/level_complete/rate/mean/last as a companion signal and external eval for promotion.
  threshold: 0.8
  threshold_operator: '>'
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - max(train/info/level_complete/from/0-1/rate)
  - max(train/info/level_complete/from/0-0/rate)
  - earlier_peak_step
  training_metrics: selection_high_watermark
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-1
  states:
  - Level1-1
  - Level1-2
  state_probs:
  - 0.45
  - 0.55
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  clip_range_vf: 0.2
  target_kl: 0.16
  vf_coef: 0.5
  adam_eps: 1.0e-08
  normalize_advantage: false
  advantage_normalization: per-task
  policy_net_arch: 64,64
  value_net_arch: 512,512
  reward_mode: score
  terminal_reward: 50
  death_penalty: 25
  completion_reward: 50
  reward_scale: 10
  score_progress_clipped: true
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  task_conditioning: true
  task_conditioning_info_vars:
  - levelHi
  - levelLo
  task_conditioning_info_values:
  - - 0
    - 0
  - - 0
    - 1
  - - 0
    - 2
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
