# Hydra composition list; imports the shared single-level 100/100 contract first.
defaults:
# Shared single-level base; supplies common environment, success criteria, runtime, and search rules.
- ../_shared/mario-single-level-100of100@_global_
# Apply this file after the base; lets Level1-1 define its own state, evidence, and defaults.
- _self_
# Goal slug; must match the directory so tools can address this contract unambiguously.
goal_slug: Level1-1
# Human-readable title; helps reports and operators identify the goal quickly.
title: Sample-efficient SuperMarioBros-NES Level1-1 completion
# Goal-specific environment overlay; only the source state differs from the shared Mario env.
environment:
  # State sampling definition; fixes the start state that attempts are counted from.
  state:
    # Stable Retro state id; Level1-1 is the only source for this goal.
    state: Level1-1
# Deterministic hash of the fully composed environment; makes exact env equality cheap to compare.
environment_hash: sha256:77e33ea51e95794b67726ea23bbf2879566dfd8c0e5126096679c6adbbf20d5e
# Goal-specific candidate ranking policy.
selection_policy:
  # Ordered ranking metrics; primary bottleneck completion comes first, training diagnostics follow as tiebreakers.
  rank_order:
  - max(train/info/level_complete/rate/min/last)
  - max(train/info/level_complete/rate/mean/last)
  - max(rollout/ep_rew_mean)
