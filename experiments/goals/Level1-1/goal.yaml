historical_context:
- The old 80/100 completed-episode target is retired. It helped find promising shapes but is not the current success criterion.
- The historical best single run reached the old 80/100 criterion at 2558256 timesteps, but it was not a confirmed baseline and did not satisfy the current 100/100 goal.
- The upstream PPO reproduction showed that the simple-action, gamma=0.9, gae_lambda=1.0 recipe can learn Level1-1, but checkpoint quality is non-monotonic.
- Historical BASELINE names are retired. In this repo, baseline means a config confirmed under the current 100/100 protocol.
