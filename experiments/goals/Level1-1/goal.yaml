# Hydra composition list; imports the shared single-level 100/100 contract first.
defaults:
# Shared single-level base; supplies common environment, success criteria, runtime, and search rules.
- ../_shared/mario-single-level-100of100@_global_
# Apply this file after the base; lets Level1-1 define its own state, seeds, evidence, and defaults.
- _self_
# Goal slug; must match the directory so tools can address this contract unambiguously.
goal_slug: Level1-1
# Human-readable title; helps reports and operators identify the goal quickly.
title: Sample-efficient SuperMarioBros-NES Level1-1 completion
# Last intentional contract update date; distinguishes current goal text from stale history.
updated_at: '2026-06-27'
# Repo path for goal-owned specs and evidence; validators use it to catch moved or mismatched files.
goal_dir: experiments/goals/Level1-1
# Goal-specific objective notes; shared numeric thresholds come from the base contract.
objective:
  # Metric semantics note; explains the exact per-source metric expected for this single start state.
  primary_metric_note: Primary metric to maximize during training. For this single-source Level1-1 goal it should match train/info/level_complete/from/0-0/rate once the source window is full; out-of-process eval remains the promotion check.
  # Attempt denominator note; prevents confusing terminal episodes with source-level attempts.
  attempt_denominator: Source-level Level1-1 attempts. In terminal-on-level-change runs this is equivalent to completed terminal episodes; in continued multi-level runs it also counts non-terminal natural level transitions.
# Goal-specific environment overlay; only the source state differs from the shared Mario env.
environment:
  # State sampling definition; fixes the start state that attempts are counted from.
  state:
    # Stable Retro state id; Level1-1 is the only source for this goal.
    state: Level1-1
# Deterministic hash of the fully composed environment; makes exact env equality cheap to compare.
environment_hash: sha256:ce3af6d41b4ef1c0d953f1c5edcb1734c2846208b16cfada98a22ccefa46764f
# Goal-specific candidate ranking policy.
selection_policy:
  # Ordered ranking metrics; primary bottleneck completion comes first, diagnostics follow as tiebreakers.
  rank_order:
  - max(train/info/level_complete/rate/min/last)
  - max(train/info/level_complete/rate/mean/last)
  - max(rollout/ep_rew_mean)
  - eval/done/level_change/from_rate/min
  - eval/done/level_change/rate
  - eval/progress/x/max
  - eval/reward/mean
# Seed protocol; fixes screening and confirmation randomness labels for comparable evidence.
seed_protocol:
  # First seed used to screen candidate recipes cheaply before confirmation.
  screen:
  - 23
  # Confirmation seeds; five-seed set guards against promoting a lucky single run.
  confirm:
  - 23
  - 24
  - 25
  - 26
  - 27
  # Seed interpretation note; avoids claiming bitwise reproducibility from CUDA training.
  same_seed_note: Same seed is a controlled randomization label, not bitwise reproducibility under default CUDA.
# Current best known evidence for this goal.
incumbent:
  # Recipe slug for the incumbent; links current evidence to a reusable recipe name.
  recipe_slug: b55-lowkl-lrdecay
  # Human-readable recipe evidence file; preserves context beyond machine-readable specs.
  recipe_file: experiments/goals/Level1-1/recipes/supermariobros_nes_level1_winning_recipe.md
  # Runtime used for incumbent evidence; flags that old evidence may need runtime revalidation.
  evidence_runtime: stable-retro-turbo==1.0.0.post16
  # Incumbent status; explains whether the recipe is confirmed under the active contract.
  status: incumbent recipe evidence; revalidate active launches under post21 runtime
  # Mean stop step for successful historical evidence; summarizes sample efficiency.
  mean_stop_step: 4372104
  # Seeds that succeeded historically; records evidence breadth without implying current confirmation.
  successful_seeds:
  - 108
  - 109
# Default launch spec for this goal; queue tooling can use it as the current representative run.
default_train_spec_file: experiments/goals/Level1-1/specs/b83-b55-post21-five-seed-l11-confirm.yaml
# Historical context; keeps old results interpretable without changing the active success contract.
historical_context:
- The old 80/100 completed-episode target is retired. It helped find promising shapes but is not the current success criterion.
- The historical best single run reached the old 80/100 criterion at 2558256 timesteps, but it was not a confirmed baseline and did not satisfy the current 100/100 goal.
- The upstream PPO reproduction showed that the simple-action, gamma=0.9, gae_lambda=1.0 recipe can learn Level1-1, but checkpoint quality is non-monotonic.
- Historical BASELINE names are retired. In this repo, baseline means a config confirmed under the current 100/100 protocol.
