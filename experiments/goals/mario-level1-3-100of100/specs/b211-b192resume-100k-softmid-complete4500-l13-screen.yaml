hypothesis: B192's completion_reward=5000 branch reached a 0.11 peak but appears less stable, while B205's 4500 midpoint tied B191. B211 resumes B192 earlier at 100k and softens to completion_reward=4500, testing whether the stronger-discovery branch benefits from a midpoint consolidation before decay.
expected_signal: Seed 80 should approach or exceed B191/B205's 0.12 peak while retaining a better final rolling rate than B192/B207. If it remains below B191, the B191 state is the better parent for further forks.
