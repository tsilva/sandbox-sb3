run_name_template: b179_l13_b166resume_3500k_consolidate_complete5000_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes the B166 step-3500000 checkpoint, after B166''s first clean clears, leaving 1.5M steps under the 5M cap. Keeps B166 critic-wide architecture with policy_net_arch=64,64, value_net_arch=512,512, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, time_penalty=-0.002, gamma=0.995, gae_lambda=0.98, normalize_advantage=true, but raises completion_reward to 5000 and uses moderate stabilization: LR 3e-5->1e-5, ent_coef=0.01->0.001, n_epochs=6, batch_size=2048, clip_range=0.08, clip_range_vf=0.15, target_kl=0.06. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
