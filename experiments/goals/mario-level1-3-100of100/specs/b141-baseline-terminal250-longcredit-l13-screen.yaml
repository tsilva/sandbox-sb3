schema_version: 1
goal: Level1-3
slug: b141-baseline-terminal250-longcredit-l13-screen
stage: screen
hypothesis: B134's advantage-normalized low-progress arm flattened with zero clean Level1-3 clears, and multiple score-mode progress-shaped arms have plateaued without conversion. A baseline reward arm removes direct x-progress shaping and relies on native/score deltas plus a strong terminal clear/life-loss signal, testing whether progress shaping is the local optimum while preserving the same environment and event contract.
expected_signal: Seed 80 should show a different reward/death/progress profile from the x-progress-shaped plateaus and ideally produce the first nonzero train/info/level_complete/from/0-2/count.
parent_spec_slug: b134-advnorm-lowprogress-complete75-l13-screen
priority: 59
seeds:
- 80
run_target: rtx4090
wandb_group: b141-l13-baseline-terminal250-longcredit-screen
wandb_tags:
- mario
- level1-3
- post21
- b141
- baseline-reward
- terminal-reward-250
- long-rollout
- gamma-097
- advantage-normalization
- high-entropy-floor
- screen
- beast3
run_name_template: b141_l13_baseline_terminal250_longcredit_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B134 zero-clear plateau follow-up using reward_mode=baseline, terminal_reward=250, reward_scale=10, n_steps=1024, gamma=0.97, gae_lambda=0.95, normalize_advantage=true, target_kl=0.14, and ent_coef_final=0.003 to test score/native plus terminal objective without direct x-progress shaping. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 1024
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.003
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.97
  gae_lambda: 0.95
  clip_range: 0.15
  target_kl: 0.14
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: baseline
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 250
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 0
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
