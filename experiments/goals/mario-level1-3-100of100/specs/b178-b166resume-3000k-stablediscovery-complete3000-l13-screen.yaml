run_name_template: b178_l13_b166resume_3000k_stablediscovery_complete3000_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes the B166 step-3000000 checkpoint, just before B166''s first clean clears, leaving 2M steps under the 5M cap. Keeps B166 reward and critic-wide architecture with policy_net_arch=64,64, value_net_arch=512,512, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, completion_reward=3000, time_penalty=-0.002, gamma=0.995, gae_lambda=0.98, normalize_advantage=true, but uses moderate stabilization: LR 3e-5->1e-5, ent_coef=0.01->0.001, n_epochs=6, batch_size=2048, clip_range=0.08, clip_range_vf=0.15, target_kl=0.06. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b166_l13_lowlr_criticwide_survival_complete3000_s80_20260628T162815Z/checkpoints/ppo_supermariobros-nes-v0_3000000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 2048
  n_epochs: 6
  learning_rate: 3.0e-05
  learning_rate_final: 1.0e-05
  learning_rate_schedule_timesteps: 2000000
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 2000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.08
  clip_range_vf: 0.15
  target_kl: 0.06
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
