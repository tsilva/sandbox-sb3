run_name_template: b207_l13_b192resume_200k_soften_complete4000_s{seed}_{utc}
run_description_template: Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B192 step-200000, equivalent to about 4.6M total B166+B178+B192 steps, leaving 400k under the 5M cap. Softens completion_reward from 5000 to 4000 and freezes with LR 5e-6->2e-6, ent_coef=0.0005->0.0001, n_epochs=4, batch_size=4096, clip_range=0.03, clip_range_vf=0.2, target_kl=0.02. Primary metric is peak train/info/level_complete/rate/min/last.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
