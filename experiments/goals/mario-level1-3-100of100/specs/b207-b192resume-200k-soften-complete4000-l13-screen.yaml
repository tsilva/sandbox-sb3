hypothesis: B192's completion_reward=5000 run reached a 0.11 peak but decayed more than B191. B207 resumes B192 at 200k and softens the completion bonus back to 4000 with freeze-style PPO updates, testing whether the stronger early reward discovered clears that a softer continuation can stabilize.
expected_signal: Seed 80 should beat B192's final window and approach or exceed B191's 0.12 peak. If it collapses, the B192 state distribution is less useful than B191 despite similar peak.
