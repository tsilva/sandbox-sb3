schema_version: 1
goal: Level1-3
slug: b195-b178resume-1300k-adaptive-clearboost5000-l13-screen
stage: screen
hypothesis: Adaptive clearboost from B178 1.5M and 1.6M may have started too late after the useful exploration window. B195 resumes B178 at 1.3M with completion_reward=5000 and moderately higher LR/entropy to test whether earlier adaptation can turn the breakthrough behavior into repeated clears.
expected_signal: Seed 80 should improve peak train/info/level_complete/rate/min/last without KL or value loss collapse. If it underperforms conservative B193/B194, adaptation is likely harmful for this checkpoint family.
parent_spec_slug: b178-b166resume-3000k-stablediscovery-complete3000-l13-screen
priority: 40
seeds:
- 80
run_target: rtx4090
wandb_group: b195-l13-b178resume-1300k-adaptive-clearboost5000-screen
wandb_tags:
- mario
- level1-3
- post21
- b195
- b178-resume
- checkpoint-1300000
- critic-wide
- adaptive-clearboost
- completion-reward-5000
- reward-scale-10
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b195_l13_b178resume_1300k_adaptive_clearboost5000_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B178 step-1300000, equivalent to about 4.3M total B166+B178 steps, leaving 700k under the 5M cap. Uses completion_reward=5000 and moderate adaptation: LR 2e-5->1e-5, ent_coef=0.003->0.001, n_epochs=6, batch_size=2048, clip_range=0.08, clip_range_vf=0.3, target_kl=0.05. Primary metric is peak train/info/level_complete/rate/min/last.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b178_l13_b166resume_3000k_stablediscovery_complete3000_s80_20260628T175445Z/checkpoints/ppo_supermariobros-nes-v0_1300000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 2048
  n_epochs: 6
  learning_rate: 2.0e-05
  learning_rate_final: 1.0e-05
  learning_rate_schedule_timesteps: 700000
  ent_coef: 0.003
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 700000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.08
  clip_range_vf: 0.3
  target_kl: 0.05
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 5000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 100000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 700000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
