schema_version: 1
goal: Level1-3
slug: b151-lowlr-survival-minprogress-complete1000-l13-screen
stage: screen
hypothesis: 'B146 crossed the 3M checkpoint with zero clean Level1-3 clears and a nearly flat short reward tail. The live Level1-3 screens have either learned progress-shaped local optima or harsh death-dominated behavior. This arm keeps the same direct Level1-3 environment and action semantics but tests a small survival-after-jump proxy using the existing time reward hook: tiny clipped progress, very small death pressure, a small per-step survival bonus, low LR, high entropy, long rollouts, and a dominant true-clean-clear bonus.'
expected_signal: Seed 80 should either produce nonzero train/info/level_complete/from/0-2/count or reveal whether a small survival bonus merely creates a no-clear waiting plateau. Reward is diagnostic only; promotion still requires the goal completion metric and out-of-process eval.
parent_spec_slug: b146-lowlr-gamma995-highentropy-complete300-l13-screen
priority: 49
seeds:
- 80
run_target: rtx4090
wandb_group: b151-l13-lowlr-survival-minprogress-complete1000-screen
wandb_tags:
- mario
- level1-3
- post21
- b151
- low-learning-rate
- survival-bonus
- minimal-progress-scale
- completion-reward-1000
- gamma-0995
- long-rollout-4096
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b151_l13_lowlr_survival_minprogress_complete1000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B146 3M zero-clear plateau backfill using LR 5e-5->3e-5, n_steps=4096, batch_size=2048, gamma=0.995, gae_lambda=0.98, ent_coef=0.05->0.01, normalize_advantage=true, target_kl=0.10, progress_reward_scale=0.01, death_penalty=2, completion_reward=1000, score_progress_clipped=true, and time_penalty=-0.005 as a small survival bonus to test patient jump timing without changing environment or action semantics. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 4096
  batch_size: 2048
  n_epochs: 10
  learning_rate: 5.0e-05
  learning_rate_final: 3.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.05
  ent_coef_final: 0.01
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.15
  target_kl: 0.1
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.01
  terminal_reward: 50
  time_penalty: -0.005
  death_penalty: 2
  completion_reward: 1000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
