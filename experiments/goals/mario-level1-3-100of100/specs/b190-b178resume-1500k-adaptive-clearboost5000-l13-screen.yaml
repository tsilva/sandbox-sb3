run_name_template: b190_l13_b178resume_1500k_adaptive_clearboost5000_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B178 step-1500000, equivalent to about 4.5M total B166+B178 steps, leaving 500k under the 5M cap. Uses completion_reward=5000 and moderate adaptation: LR 2e-5->1e-5, ent_coef=0.003->0.001, n_epochs=6, batch_size=2048, clip_range=0.08, clip_range_vf=0.3, target_kl=0.05.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b178_l13_b166resume_3000k_stablediscovery_complete3000_s80_20260628T175445Z/checkpoints/ppo_supermariobros-nes-v0_1500000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 2048
  n_epochs: 6
  learning_rate: 2.0e-05
  learning_rate_final: 1.0e-05
  learning_rate_schedule_timesteps: 500000
  ent_coef: 0.003
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 500000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.08
  clip_range_vf: 0.3
  target_kl: 0.05
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
