schema_version: 1
goal: Level1-3
slug: b134-advnorm-lowprogress-complete75-l13-screen
stage: screen
hypothesis: If high death and completion rewards create unstable advantage scale before first clear discovery, enabling PPO advantage normalization on the B128 reward shape should stabilize updates without changing the Level1-3 objective.
expected_signal: Seed 80 should preserve or improve PPO health and produce a nonzero clean-clear count where the unnormalized B128 shape remains at zero.
parent_spec_slug: b128-lowprogress-death75-complete75-l13-screen
priority: 66
seeds:
- 80
run_target: rtx4090
wandb_group: b134-l13-advnorm-lowprogress-complete75-screen
wandb_tags:
- mario
- level1-3
- post21
- b134
- advantage-normalization
- low-progress-scale
- death-penalty-75
- completion-reward-75
- screen
- beast3
run_name_template: b134_l13_advnorm_lowprogress_complete75_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B128 low-progress reward shape with normalize_advantage=true to stabilize stronger death/completion rewards. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.25
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 75
  completion_reward: 75
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
