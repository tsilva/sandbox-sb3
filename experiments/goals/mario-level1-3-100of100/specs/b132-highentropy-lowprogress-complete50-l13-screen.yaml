schema_version: 1
goal: Level1-3
slug: b132-highentropy-lowprogress-complete50-l13-screen
stage: screen
hypothesis: If B127-B131 still fail to discover any clean Level1-3 clears, the stronger reward shaping may be reducing exploration too quickly; keeping a higher entropy floor while preserving B127's low-progress survival/clear rewards should make first-clear discovery more likely without changing environment semantics.
expected_signal: Seed 80 should produce an earlier first nonzero train/info/level_complete/from/0-2/count than B127 or maintain healthier exploration while preserving controlled PPO updates.
parent_spec_slug: b127-lowprogress-death50-complete50-l13-screen
priority: 68
seeds:
- 80
run_target: rtx4090
wandb_group: b132-l13-highentropy-lowprogress-complete50-screen
wandb_tags:
- mario
- level1-3
- post21
- b132
- high-entropy-floor
- low-progress-scale
- death-penalty-50
- completion-reward-50
- screen
- beast3
run_name_template: b132_l13_highentropy_lowprogress_complete50_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B127 low-progress survival/clear shaping with ent_coef_final=0.003 over 5M to keep exploration alive. Primary metric is peak train/info/level_complete/rate/min/last, matching train/info/level_complete/from/0-2/rate once the source window is full; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.003
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.5
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 50
  completion_reward: 50
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
