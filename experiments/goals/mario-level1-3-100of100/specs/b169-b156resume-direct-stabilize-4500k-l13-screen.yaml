schema_version: 1
goal: Level1-3
slug: b169-b156resume-direct-stabilize-4500k-l13-screen
stage: screen
hypothesis: 'B156 is the first active Level1-3 run to pass the early bottleneck: deterministic artifact eval moves from the failed-run wall near x=670 to x=1645 at the 4.5M checkpoint, and training clean clears begin shortly before 4M. B167 attempted this fork through resume_artifact but failed before W&B startup, so this direct-resume retry points at the verified checkpoint file already staged on beast-3 and spends only the remaining 500k cap budget on a conservative low-LR, low-entropy stabilization pass.'
expected_signal: Seed 80 should preserve B156's post-bottleneck behavior and increase the rolling Level1-3 completion rate within the 500k continuation budget. If the policy collapses or fails to add clears, the B156 behavior is fragile under further PPO updates rather than merely undertrained.
parent_spec_slug: b156-lowlr-criticwide-tinyprogress-complete1500-l13-screen
priority: 34
seeds:
- 80
run_target: rtx4090
wandb_group: b169-l13-b156resume-direct-stabilize-4500k-screen
wandb_tags:
- mario
- level1-3
- post21
- b169
- b156-resume
- direct-resume
- checkpoint-4500000
- critic-wide
- stabilize
- low-learning-rate
