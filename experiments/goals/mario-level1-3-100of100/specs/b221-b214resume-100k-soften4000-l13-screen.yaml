schema_version: 1
goal: Level1-3
slug: b221-b214resume-100k-soften4000-l13-screen
stage: screen
hypothesis: B214's 4500 clear bonus reliably discovers a 0.13 window but the policy decays afterward. B221 resumes the first B214 100k checkpoint and softens completion_reward back to 4000 while keeping freeze-style updates, testing whether less sparse-clear pressure after discovery preserves the platforming behavior better.
expected_signal: Seed 80 should preserve a better final clear window than B214 repeats while remaining near the 0.13 peak. If both peak and final window regress, the post-discovery softening is not useful.
