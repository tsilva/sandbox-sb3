schema_version: 1
goal: Level1-3
slug: b155-lowlr-gentlepress-tinyprogress-complete1500-l13-screen
stage: screen
hypothesis: B150 reached 3.5M+ steps with zero clean Level1-3 clears while rollout reward was almost entirely x-progress, suggesting a stable run-right/no-clear attractor rather than useful platform timing. This arm keeps the same direct Level1-3 environment and action semantics, but sharply reduces clipped x-progress reward, adds only a tiny survival bonus, keeps death pressure light, raises the true clear bonus, and uses a B110-style gentler PPO pressure profile with LR in the Level1-3 low-learning-rate band.
expected_signal: Seed 80 should either produce the first nonzero train/info/level_complete/from/0-2/count, or show that suppressing x-progress dominance and gentler updates still fails to discover safe Level1-3 jump timing under the current legal reward/hyperparameter-only scope.
parent_spec_slug: b150-lowlr-explore-death0-complete750-l13-screen
priority: 45
seeds:
- 80
run_target: rtx4090
wandb_group: b155-l13-lowlr-gentlepress-tinyprogress-complete1500-screen
wandb_tags:
- mario
- level1-3
- post21
- b155
- low-learning-rate
- gentler-update-pressure
- tiny-clipped-progress
- survival-bonus
- death-penalty-light
- completion-reward-1500
- gamma-0995
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b155_l13_lowlr_gentlepress_tinyprogress_complete1500_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B150 3.5M zero-clear x-progress plateau backfill using clipped progress cap 10, progress_reward_scale=0.003, death_penalty=1, completion_reward=1500, time_penalty=-0.002, LR 7e-5->5e-5, n_steps=1024, batch_size=1024, gamma=0.995, gae_lambda=0.98, ent_coef=0.05->0.005, normalize_advantage=true, clip_range=0.12, clip_range_vf=0.2, target_kl=0.12, and vf_coef=0.5 to test whether gentler PPO updates plus less dense x-progress reward can escape the Level1-3 no-clear attractor. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 1024
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 5.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.05
  ent_coef_final: 0.005
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.12
  clip_range_vf: 0.2
  target_kl: 0.12
  vf_coef: 0.5
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 1500
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
