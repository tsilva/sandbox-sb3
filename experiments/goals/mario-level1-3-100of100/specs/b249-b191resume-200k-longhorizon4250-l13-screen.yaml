hypothesis: Level1-3 rewards require long sequences of timed jumps, and B236's 0.14 high-water came from the longest-credit branch tested so far. B249 extends that idea with a longer rollout horizon and gamma=0.999/gae_lambda=1.0 while keeping completion_reward=4250, testing whether still-longer credit assignment helps the tree-platform sequence.
expected_signal: Seed 80 should improve peak completion rate or max clean count over B242 repeats. If throughput drops without completion gain, the longer horizon is not worth the extra update latency.
