stage: screen
hypothesis: B184's completion_reward=5000 arm reached a useful 0.05 final rolling min rate, but KL and clip fraction were near zero, suggesting the very conservative optimizer mostly preserved rather than improved the policy. B187 resumes B178 at 1.6M with the same clearboost but moderately higher learning pressure, testing whether the discovered high-clear behavior can adapt into a stronger completion window instead of merely being held in place.
expected_signal: Seed 80 should improve over B184/B185 on peak train/info/level_complete/rate/min/last or clear density without collapsing. If KL rises but completion rate falls, the high-window policy is too fragile for this much adaptation.
