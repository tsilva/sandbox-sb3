schema_version: 1
goal: Level1-3
slug: b147-lowlr-baseline-gamma995-terminal300-l13-screen
stage: screen
hypothesis: B142's low-death tiny-progress score arm passed the 2M checkpoint with zero clean Level1-3 clears and an essentially flat reward tail. B145's baseline-reward arm is still young and moving, so this companion tests whether the same low-LR, high-entropy, high-gamma, long-rollout treatment used by B146 works better when direct x-progress shaping is removed.
expected_signal: Seed 80 should either produce nonzero train/info/level_complete/from/0-2/count or give a clearer native/score-plus-terminal death/progress profile for deciding whether Level1-3 needs jump-specific reward shaping next.
parent_spec_slug: b145-b55baseline-terminal300-l13-screen
priority: 53
seeds:
- 80
run_target: rtx4090
wandb_group: b147-l13-lowlr-baseline-gamma995-terminal300-screen
wandb_tags:
- mario
- level1-3
- post21
- b147
- low-learning-rate
- baseline-reward
- gamma-0995
- long-rollout
- high-entropy
- terminal-reward-300
- advantage-normalization
- screen
- beast3
run_name_template: b147_l13_lowlr_baseline_gamma995_terminal300_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B142 zero-clear plateau backfill using reward_mode=baseline with terminal_reward=300, lower LR 7e-5->4e-5, n_steps=2048, gamma=0.995, gae_lambda=0.97, ent_coef=0.03->0.005, normalize_advantage=true, and target_kl=0.12 to test delayed jump credit without direct x-progress shaping. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-3 screen, the primary metric should match train/info/level_complete/from/0-2/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-3/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 2048
  batch_size: 1024
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 4.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.03
  ent_coef_final: 0.005
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.995
  gae_lambda: 0.97
  clip_range: 0.15
  target_kl: 0.12
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: baseline
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 300
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 0.0
  reward_scale: 10
  score_progress_clipped: false
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
