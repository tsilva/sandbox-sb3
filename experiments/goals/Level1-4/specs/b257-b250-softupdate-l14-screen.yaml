schema_version: 1
goal: Level1-4
slug: b257-b250-softupdate-l14-screen
stage: screen
hypothesis: B250's successful seeds converged with low KL while failed seeds stayed in weaker local behavior. Slightly lower learning rate, clip range, and target KL test whether softer policy updates improve cross-seed retention without changing reward semantics.
expected_signal: Seed 90 should reach 100/100 with a smoother KL/clip tail and no loss of sample efficiency large enough to threaten the 5M cap.
parent_spec_slug: b250-b55post21-l14-screen
priority: 78
seeds:
- 90
run_target: rtx4090
wandb_group: b257-l14-b250-softupdate-screen
wandb_tags:
- mario
- level1-4
- world1-4
- post21
- b257
- b250
- soft-update
- target-kl-010
- clip-012
- no-completion-bonus
- screen
- beast3
run_name_template: b257_l14_softupdate_s{seed}_{utc}
run_description_template: Single-seed Beast3 robustness screen for World 1-4 100/100, seed {seed}; B250 reward with LR 1.2e-4->8e-5, clip_range=0.12, target_kl=0.10. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-4 screen, the primary metric should match train/info/level_complete/from/0-3/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  threshold: 1.0
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-4/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-4
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00012
  learning_rate_final: 8.0e-05
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.0001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.12
  target_kl: 0.1
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 0.0
  reward_scale: 10
  score_progress_clipped: false
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
