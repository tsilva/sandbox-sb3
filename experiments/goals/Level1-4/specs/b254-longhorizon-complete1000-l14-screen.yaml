schema_version: 1
goal: Level1-4
slug: b254-longhorizon-complete1000-l14-screen
stage: screen
hypothesis: If World 1-4 needs still longer temporal credit than B253, a lower-update-pressure long-horizon PPO arm should preserve exploration while assigning value across the castle sequence. The completion reward still fires only on a true clean level clear.
expected_signal: Seed 90 should improve peak Level1-4 completion rate, max clean count, or progress over B253 enough to justify a narrower long-horizon follow-up; if throughput drops without signal, prefer the shorter B253 horizon.
parent_spec_slug: b249-b191resume-200k-longhorizon4250-l13-screen
priority: 66
seeds:
- 90
run_target: rtx4090
wandb_group: b254-l14-longhorizon-complete1000-screen
wandb_tags:
- mario
- level1-4
- world1-4
- post21
- b254
- longhorizon
- completion-reward-1000
- reward-scale-10
- gamma-0999
- gae-100
- advantage-normalization
- critic-wide
- screen
- beast3
run_name_template: b254_l14_longhorizon_complete1000_s{seed}_{utc}
run_description_template: Single-seed Beast3 scratch long-horizon screen for World 1-4 100/100, seed {seed}; n_steps=2048, gamma=0.999, gae_lambda=1.0, conservative updates, clipped low progress, wide critic, and clean completion_reward=1000. Primary metric is peak train/info/level_complete/rate/min/last.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-4 screen, the primary metric should match train/info/level_complete/from/0-3/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  threshold: 1.0
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-4/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-4
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 2048
  batch_size: 8192
  n_epochs: 4
  learning_rate: 3.0e-05
  learning_rate_final: 5.0e-06
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.003
  ent_coef_final: 0.0003
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.999
  gae_lambda: 1.0
  clip_range: 0.05
  clip_range_vf: 0.3
  target_kl: 0.03
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.01
  terminal_reward: 50
  time_penalty: -0.001
  death_penalty: 5
  completion_reward: 1000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
