# Hydra composition list; imports the shared single-level 100/100 contract first.
defaults:
# Shared single-level base; supplies common environment, success criteria, runtime, and search rules.
- ../_shared/mario-single-level-100of100@_global_
# Apply this file after the base; lets Level1-4 define its state, seeds, evidence, and defaults.
- _self_
# Goal slug; must match the directory so tools can address this contract unambiguously.
goal_slug: Level1-4
# Human-readable title; helps reports and operators identify the goal quickly.
title: Sample-efficient SuperMarioBros-NES World 1-4 completion
# Last intentional contract update date; distinguishes current goal text from stale history.
updated_at: '2026-06-29'
# Repo path for goal-owned specs and evidence; validators use it to catch moved or mismatched files.
goal_dir: experiments/goals/Level1-4
# Goal-specific objective notes; shared numeric thresholds come from the base contract.
objective:
  # Metric semantics note; explains the exact per-source metric expected for this single start state.
  primary_metric_note: Primary metric to maximize during training. For this single-source World 1-4 goal it should match train/info/level_complete/from/0-3/rate once the source window is full; out-of-process eval remains the promotion check.
  # Attempt denominator note; prevents confusing terminal episodes with source-level attempts.
  attempt_denominator: Source-level Level1-4 attempts. In terminal-on-level-change runs this is equivalent to completed terminal episodes; in continued multi-level runs it also counts non-terminal natural level transitions.
# Goal-specific environment overlay; only the source state differs from the shared Mario env.
environment:
  # State sampling definition; fixes the start state that attempts are counted from.
  state:
    # Stable Retro state id; Level1-4 is the only source for this goal.
    state: Level1-4
# Deterministic hash of the fully composed environment; makes exact env equality cheap to compare.
environment_hash: sha256:a88196dbad0d030cee1b847dd5ecc99e36e6d15fdd527224e28b7aeec622fcc3
# Goal-specific candidate ranking policy.
selection_policy:
  # Ordered ranking metrics; primary bottleneck completion comes first, eval diagnostics follow.
  rank_order:
  - max(train/info/level_complete/rate/min/last)
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from_rate/min
  - eval/done/level_change/from/Level1-4/rate
  - eval/done/level_change/rate
  - eval/progress/x/max
  - eval/reward/mean
# Seed protocol; fixes screening and confirmation randomness labels for comparable evidence.
seed_protocol:
  # First seed used to screen candidate recipes cheaply before confirmation.
  screen:
  - 90
  # Confirmation seeds; five-seed set guards against promoting a lucky single run.
  confirm:
  - 90
  - 91
  - 92
  - 93
  - 94
  # Seed interpretation note; avoids claiming bitwise reproducibility from CUDA training.
  same_seed_note: Same seed is a controlled randomization label, not bitwise reproducibility under default CUDA.
# Goal-specific budget and stopping policy.
cap_policy:
  # Early stop definition; records the strict success stop used by Level1-4 train specs.
  early_stop_rule: Stop training once train/info/level_complete/rate/min/last > 0.99; this is the strict 100/100 source-attempt window for the single Level1-4 start state.
# Current best known evidence for this goal.
incumbent:
  # Recipe slug for the incumbent; null means no confirmed recipe owns the goal yet.
  recipe_slug: null
  # Incumbent evidence file; null because no confirmed Level1-4 recipe has been promoted yet.
  recipe_file: null
  # Runtime used for incumbent evidence; null because there is no confirmed incumbent yet.
  evidence_runtime: null
  # Incumbent status; summarizes the latest near-miss and current confirmation candidate.
  status: B250/B255 reached 100/100 on seeds 90, 92, and 93, but failed the full five-seed confirmation protocol because seed 91 peaked at 0.17 and seed 94 peaked at 0.98. B257 soft-update then reached 100/100 on screen seed 90 and is frozen for B261 confirmation on seeds 91-94.
  # Mean stop step; null until confirmation produces successful seeds.
  mean_stop_step: null
  # Successful confirmed seeds; empty until a recipe satisfies this goal.
  successful_seeds: []
# Default launch spec for this goal; queue tooling can use it as the current representative run.
default_train_spec_file: experiments/goals/Level1-4/specs/b261-b257-softupdate-four-seed-l14-confirm.yaml
# Historical context; keeps old results interpretable without changing the active success contract.
historical_context:
- This goal uses the same 100/100 rolling source-attempt success criterion as the single-level Level1-1, Level1-2, and Level1-3 goals.
- The old completed-episode stop flags are retired from new launches; use attempt-window metrics from configured info events instead.
- Historical BASELINE names are retired. In this repo, baseline means a config confirmed under the current 100/100 protocol.
# Operator notes specific to this goal; extends the shared notes with Level1-4 facts.
notes:
- Use this file as the operator-facing current contract; goal-owned specs and recipe evidence live beside it under this goal directory.
- Do not promote a policy from final checkpoint reward alone.
- Prefer paired confirmation against the incumbent before declaring a new baseline.
- The installed SuperMarioBros-Nes-v0 state list was checked on 2026-06-28 and includes Level1-4.
