schema_version: 1
slug: b243-b236resume-100k-hold4250-l13-screen
hypothesis: >-
  B236 peaked near 198k continuation steps, so its 200k checkpoint may already be at or just past the
  fragile high-window. B243 resumes from the B236 100k checkpoint and applies a moderate hold schedule
  before the peak to test whether the policy can be guided into a more durable high-completion region.
  Seed 80 should reach the 0.12-0.14 band before 300k additional steps and finish with a stronger
  completion window than B236. If it underperforms, the exact B236 update path rather than a gentler
  hold may be required.
parent_spec_slug: b236-b191resume-200k-longcredit4250-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b243-l13-b236resume-100k-hold4250-screen
