run_name_template: b243_l13_b236resume_100k_hold4250_s{seed}_{utc}
run_description_template: Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B236 step-100000, equivalent to about 4.7M total B166+B178+B191+B236 steps, leaving 300k under the 5M cap. Uses a moderate low-update hold schedule before the observed B236 198k high-window. Primary metric is peak train/info/level_complete/rate/min/last.
