defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b247-b191resume-200k-noadvnorm4250-l13-screen
hypothesis: >-
  B236's completion_reward=4250 long-credit branch produced the current 0.14 high-water, but exact
  B242 repeats mostly fell back to 0.09-0.11. The successful Level1 recipe family used
  normalize_advantage=false, so B247 tests whether preserving raw advantage scale with a reduced
  effective reward magnitude can make the 4250 branch discover or preserve stronger Level1-3 clear
  timing. Seed 80 should either reproduce the B236 0.14 high-window or improve final
  train/info/level_complete/rate/min/last over B242 repeats. If PPO health degrades without completion
  improvement, no-advantage-normalization is not the missing lever for this continuation.
parent_spec_slug: b242-b191resume-200k-longcredit4250-ckpt25k-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b247-l13-b191resume-200k-noadvnorm4250-screen
wandb_tags:
- mario
- level1-3
- post21
- b247
- b191-resume
- checkpoint-200000
- critic-wide
- longcredit
- no-advantage-normalization
- completion-reward-4250
- reward-scale-20
- gamma-0997
- gae-099
- screen
- beast3
run_name_template: b247_l13_b191resume_200k_noadvnorm4250_s{seed}_{utc}
run_description_template: Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B191 step-200000, leaving 400k under the 5M effective cap. Keeps B236 completion_reward=4250 and long-credit gamma=0.997/gae_lambda=0.99, but disables advantage normalization and raises reward_scale to 20 to test a Level1-style PPO scaling path. Primary metric is peak train/info/level_complete/rate/min/last.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b191_l13_b178resume_1400k_clearboost4000_s80_20260628T183624Z/checkpoints/ppo_supermariobros-nes-v0_200000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 4
  learning_rate: 4.0e-06
  learning_rate_final: 1.5e-06
  learning_rate_schedule_timesteps: 400000
  ent_coef: 0.0004
  ent_coef_final: 8.0e-05
  ent_coef_schedule_timesteps: 400000
  gamma: 0.997
  gae_lambda: 0.99
  clip_range: 0.03
  clip_range_vf: 0.2
  target_kl: 0.02
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 4250
  reward_scale: 20
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 50000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 400000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
