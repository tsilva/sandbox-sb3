defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b128-lowprogress-death75-complete75-l13-screen
hypothesis: >-
  If B123's death_penalty=50 still leaves policies in life-loss-only churn, a stronger balanced
  survival/clear signal with progress_reward_scale=0.25, death_penalty=75, and completion_reward=75
  should further reduce progress-only optimization pressure. Seed 80 should show better survival
  behavior and produce a nonzero Level1-3 clean-clear count or rate where B122-B126 remained at zero.
parent_spec_slug: b127-lowprogress-death50-complete50-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b128-l13-lowprogress-death75-complete75-screen
wandb_tags:
- mario
- level1-3
- post21
- b128
- low-progress-scale
- death-penalty-75
- completion-reward-75
- clipped-progress
- survival-signal
- screen
- beast3
run_name_template: b128_l13_lowprogress_death75_complete75_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; clipped-progress score recipe with progress_reward_scale=0.25, death_penalty=75, clean completion_reward=75, and slow entropy floor. Primary metric is peak train/info/level_complete/rate/min/last, matching train/info/level_complete/from/0-2/rate once the source window is full; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.25
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 75
  completion_reward: 75
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
