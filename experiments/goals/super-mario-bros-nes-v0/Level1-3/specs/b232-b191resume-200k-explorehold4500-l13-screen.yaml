schema_version: 1
slug: b232-b191resume-200k-explorehold4500-l13-screen
hypothesis: >-
  B214's lower entropy may preserve the discovered behavior briefly but collapse after the high-window
  region. B232 keeps the B214 reward and clip/LR but uses a slightly higher entropy tail, testing
  whether maintaining exploration prevents the policy from becoming brittle after the first
  platforming bottleneck. Seed 80 should exceed the 0.13 peak or keep a better final rolling
  completion rate. If it lowers peak and only increases reward variance, the entropy tail is
  counterproductive.
parent_spec_slug: b214-b191resume-200k-freezemid4500-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b232-l13-b191resume-200k-explorehold4500-screen
