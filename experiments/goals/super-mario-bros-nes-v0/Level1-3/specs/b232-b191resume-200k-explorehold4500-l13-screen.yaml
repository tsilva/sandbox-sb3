run_name_template: b232_l13_b191resume_200k_explorehold4500_s{seed}_{utc}
run_description_template: Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B191 step-200000, equivalent to about 4.6M total B166+B178+B191 steps, leaving 400k under the 5M cap. Keeps B214 completion_reward=4500, LR 5e-6->2e-6, clip_range=0.03, but uses ent_coef=0.001->0.0005 to retain exploration. Primary metric is peak train/info/level_complete/rate/min/last.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b191_l13_b178resume_1400k_clearboost4000_s80_20260628T183624Z/checkpoints/ppo_supermariobros-nes-v0_200000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 4
  learning_rate: 5.0e-06
  learning_rate_final: 2.0e-06
  learning_rate_schedule_timesteps: 400000
  ent_coef: 0.001
  ent_coef_final: 0.0005
  ent_coef_schedule_timesteps: 400000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.03
  clip_range_vf: 0.2
  target_kl: 0.02
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 4500
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
