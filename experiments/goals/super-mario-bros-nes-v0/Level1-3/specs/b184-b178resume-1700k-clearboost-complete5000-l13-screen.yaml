schema_version: 1
slug: b184-b178resume-1700k-clearboost-complete5000-l13-screen
hypothesis: >-
  B178 reached the best rolling Level1-3 completion signal so far, but the policy did not consolidate
  by the end of its 2M continuation. B184 resumes the same B178 1.7M high-water checkpoint as
  B182/B183, keeps the original reward scale, and raises completion_reward from 3000 to 5000. This
  tests whether the high-clear policy still needs a stronger sparse clean-clear signal once it has
  already crossed the initial bottleneck. Seed 80 should improve clean-clear density or peak
  train/info/level_complete/rate/min/last relative to B183. If reward and value loss rise without a
  better rolling completion window, the clear bonus magnitude is not the missing consolidation lever.
parent_spec_slug: b178-b166resume-3000k-stablediscovery-complete3000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b184-l13-b178resume-1700k-clearboost-complete5000-screen
