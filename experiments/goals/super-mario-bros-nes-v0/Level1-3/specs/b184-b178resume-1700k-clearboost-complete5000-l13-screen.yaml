run_name_template: b184_l13_b178resume_1700k_clearboost_complete5000_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes the B178 step-1700000 continuation checkpoint, equivalent to about 4.7M total B166+B178 steps, leaving 300k steps under the 5M cap. Keeps B178 architecture and original reward scale with policy_net_arch=64,64, value_net_arch=512,512, reward_scale=10, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, time_penalty=-0.002, gamma=0.995, gae_lambda=0.98, normalize_advantage=true, raises completion_reward to 5000, and uses conservative continuation settings: LR 1e-5->5e-6, ent_coef=0.001->0.0005, n_epochs=6, batch_size=4096, clip_range=0.05, clip_range_vf=0.3, target_kl=0.03. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.'
