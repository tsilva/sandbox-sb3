defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b162-lowlr-fastupdate-antistall-complete3000-l13-screen
hypothesis: >-
  B157 crossed the 2M-step maturity point with zero clean Level1-3 clears and an essentially flat
  reward tail. That arm tested high entropy plus fast PPO updates, but it also removed death pressure
  and used a small survival bonus, so it may have encouraged dithering rather than committing to safe
  platform traversal. This arm keeps the direct Level1-3 environment and fast-update/high-entropy PPO
  shape, but replaces the survival bonus with a light anti-stall time penalty, restores small death
  pressure, slightly strengthens tiny clipped progress, and makes true clean clears overwhelmingly
  dominant. Seed 80 should either produce nonzero train/info/level_complete/from/0-2/count, or show
  that fast high-entropy updates with anti-stall pressure still cannot find a clean Level1-3
  trajectory under the current legal reward/hyperparameter scope.
parent_spec_slug: b157-lowlr-entropyburst-fastupdate-complete2000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b162-l13-lowlr-fastupdate-antistall-complete3000-screen
wandb_tags:
- mario
- level1-3
- post21
- b162
- low-learning-rate
- fast-updates
- anti-stall
- high-entropy
- tiny-clipped-progress
- light-death-penalty
- completion-reward-3000
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b162_l13_lowlr_fastupdate_antistall_complete3000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B157 zero-clear flat-tail backfill using fast PPO updates with n_steps=512, batch_size=512, LR 7e-5->4e-5, gamma=0.995, gae_lambda=0.98, ent_coef=0.12->0.02, normalize_advantage=true, clip_range=0.12, target_kl=0.12, progress_reward_cap=5, progress_reward_scale=0.005, death_penalty=1, completion_reward=3000, and time_penalty=0.002 to test whether anti-stall pressure plus frequent high-entropy updates can discover clean Level1-3 traversal. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 4.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.12
  ent_coef_final: 0.02
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.12
  target_kl: 0.12
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 5.0
  progress_reward_scale: 0.005
  terminal_reward: 50
  time_penalty: 0.002
  death_penalty: 1
  completion_reward: 3000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
