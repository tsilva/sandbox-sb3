defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b154-lowlr-fastupdate-rawprogress-complete1000-l13-screen
hypothesis: >-
  B149's additive tiny-progress arm crossed 2.4M steps with zero clean Level1-3 clears and a nearly
  flat reward tail. Removing score reward may have made the first successful platform traversal too
  sparse. This arm keeps the low-LR, high-entropy, frequent-update, low-death setup from B152, but
  uses raw x-progress in score mode so successful forward velocity after landing can provide a
  stronger dense signal while true clean clears still dominate via a large completion bonus. Seed 80
  should either produce nonzero train/info/level_complete/from/0-2/count or show that raw
  forward-progress reinforcement still only creates a no-clear Level1-3 progress local optimum.
parent_spec_slug: b152-lowlr-fastupdate-deathlight-complete1000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b154-l13-lowlr-fastupdate-rawprogress-complete1000-screen
wandb_tags:
- mario
- level1-3
- post21
- b154
- low-learning-rate
- fast-updates
- raw-progress
- death-penalty-light
- completion-reward-1000
- gamma-0995
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b154_l13_lowlr_fastupdate_rawprogress_complete1000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B149 zero-clear additive-reward plateau backfill using score-mode raw progress, n_steps=512, batch_size=512, LR 5e-5->3e-5, gamma=0.995, gae_lambda=0.98, ent_coef=0.05->0.01, normalize_advantage=true, target_kl=0.10, progress_reward_scale=0.02, death_penalty=2, completion_reward=1000, and score_progress_clipped=false to test whether stronger forward-landing reinforcement helps Level1-3 jump timing. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 5.0e-05
  learning_rate_final: 3.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.05
  ent_coef_final: 0.01
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.15
  target_kl: 0.1
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.02
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 2
  completion_reward: 1000
  reward_scale: 10
  score_progress_clipped: false
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
