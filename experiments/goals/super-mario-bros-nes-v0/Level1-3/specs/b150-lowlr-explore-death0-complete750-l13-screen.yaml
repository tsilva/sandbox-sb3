defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b150-lowlr-explore-death0-complete750-l13-screen
hypothesis: >-
  Level1-3 may be stuck before safe jump timing because pit deaths make exploration too punitive
  before the policy discovers a successful trajectory. This arm preserves the same Level1-3
  environment and action semantics but removes explicit death penalty, uses a tiny clipped progress
  gradient, holds entropy higher, lowers LR further, lengthens rollout credit, and makes true clean
  clears dominate with a very large completion bonus. Seed 80 should either produce the first nonzero
  train/info/level_complete/from/0-2/count or show that even death-light exploration cannot escape the
  first-platform local optimum without new jump-specific reward shaping.
parent_spec_slug: b146-lowlr-gamma995-highentropy-complete300-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b150-l13-lowlr-explore-death0-complete750-screen
wandb_tags:
- mario
- level1-3
- post21
- b150
- low-learning-rate
- death-penalty-zero
- tiny-progress-scale
- completion-reward-750
- gamma-0995
- long-rollout-4096
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b150_l13_lowlr_explore_death0_complete750_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B143/B144/B145 zero-clear plateau backfill using LR 5e-5->3e-5, n_steps=4096, batch_size=2048, gamma=0.995, gae_lambda=0.98, ent_coef=0.05->0.01, normalize_advantage=true, target_kl=0.10, progress_reward_scale=0.02, death_penalty=0, completion_reward=750, and score_progress_clipped=true to test whether harsh death pressure is blocking exploration before safe jump timing is discovered. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 4096
  batch_size: 2048
  n_epochs: 10
  learning_rate: 5.0e-05
  learning_rate_final: 3.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.05
  ent_coef_final: 0.01
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.15
  target_kl: 0.1
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.02
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 0
  completion_reward: 750
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
