defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b199-b178resume-1100k-clearboost4000-l13-screen
hypothesis: >-
  B199 starts the clearboost continuation still earlier, at B178 step 1.1M, to test whether completion
  shaping needs to guide the policy before the first visible clean-clear cluster. It uses the more
  stable completion_reward=4000 arm for 900k steps under the 5M cap. Seed 80 should improve
  time-to-first-clean-clear or peak train/info/level_complete/rate/min/last versus the 1.2M/1.3M
  conservative forks.
parent_spec_slug: b178-b166resume-3000k-stablediscovery-complete3000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b199-l13-b178resume-1100k-clearboost4000-screen
wandb_tags:
- mario
- level1-3
- post21
- b199
- b178-resume
- checkpoint-1100000
- critic-wide
- clearboost
- completion-reward-4000
- reward-scale-10
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b199_l13_b178resume_1100k_clearboost4000_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B178 step-1100000, equivalent to about 4.1M total B166+B178 steps, leaving 900k under the 5M cap. Uses completion_reward=4000 with conservative PPO continuation: LR 1e-5->5e-6, ent_coef=0.001->0.0005, n_epochs=6, batch_size=4096, clip_range=0.05, clip_range_vf=0.3, target_kl=0.03. Primary metric is peak train/info/level_complete/rate/min/last.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b178_l13_b166resume_3000k_stablediscovery_complete3000_s80_20260628T175445Z/checkpoints/ppo_supermariobros-nes-v0_1100000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 6
  learning_rate: 1.0e-05
  learning_rate_final: 5.0e-06
  learning_rate_schedule_timesteps: 900000
  ent_coef: 0.001
  ent_coef_final: 0.0005
  ent_coef_schedule_timesteps: 900000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.05
  clip_range_vf: 0.3
  target_kl: 0.03
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 4000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 100000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 900000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
