defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b174-b156resume-4000k-ultrastable-complete3000-l13-screen
hypothesis: >-
  B171/B172 showed that B156 checkpoint forks produce immediate clean clears but fail to consolidate a
  reliable 100-attempt window. B174 resumes the B156 4.0M checkpoint with the same ultra-low update
  pressure as B173, but uses completion_reward=3000 to match the B166/B172 sparse-clear weighting that
  rediscovered more clears than the original B156 recipe. Seed 80 should improve clear density over
  B173 if B156's original completion_reward=1500 underweights the sparse clean-clear event. If B174
  collapses faster than B173, the stronger clear bonus is destabilizing even under ultra-low update
  pressure.
parent_spec_slug: b156-lowlr-criticwide-tinyprogress-complete1500-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b174-l13-b156resume-4000k-ultrastable-complete3000-screen
wandb_tags:
- mario
- level1-3
- post21
- b174
- b156-resume
- checkpoint-4000000
- critic-wide
- ultrastable
- low-learning-rate
- tiny-clipped-progress
- survival-bonus
- completion-reward-3000
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b174_l13_b156resume_4000k_ultrastable_complete3000_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 mounted checkpoint fork for Level1-3 100/100, seed {seed}; resumes the B156 step-4000000 checkpoint, leaving 1M train steps under the 5M cap. Keeps B156 architecture with policy_net_arch=64,64 and value_net_arch=512,512, but raises completion_reward to 3000 while using ultra-stable continuation settings: LR 1e-5->5e-6, ent_coef=0.001->0.0, n_epochs=4, batch_size=2048, gamma=0.995, gae_lambda=0.98, normalize_advantage=true, clip_range=0.06, clip_range_vf=0.1, target_kl=0.03, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, and time_penalty=-0.002. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b156_l13_lowlr_criticwide_tinyprogress_complete1500_s80_20260628T151901Z/checkpoints/ppo_supermariobros-nes-v0_4000000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 2048
  n_epochs: 4
  learning_rate: 1.0e-05
  learning_rate_final: 5.0e-06
  learning_rate_schedule_timesteps: 1000000
  ent_coef: 0.001
  ent_coef_final: 0.0
  ent_coef_schedule_timesteps: 1000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.06
  clip_range_vf: 0.1
  target_kl: 0.03
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 3000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 100000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 1000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
