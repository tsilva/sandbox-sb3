defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b222-b214erepeatresume-100k-ultrahold4500-l13-screen
hypothesis: >-
  B214 repeat 6nmufrl0 matched the 0.13 high-water and tied the best B214 final window at 0.06 with a
  high clean count. B222 resumes that repeat at 100k with the ultra-hold continuation, testing whether
  the strongest B214 repeat parent preserves the discovered policy better than B219/B220. Seed 80
  should sustain a stronger final train/info/level_complete/rate/min/last than the parent B214 repeat
  or exceed the 0.13 peak. If it underperforms B220, B214 repeat checkpoint continuation is sensitive
  to parent trajectory despite similar peak metrics.
parent_spec_slug: b214-b191resume-200k-freezemid4500-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b222-l13-b214erepeatresume-100k-ultrahold4500-screen
wandb_tags:
- mario
- level1-3
- post21
- b222
- b214-repeat-resume
- checkpoint-100000
- critic-wide
- ultrahold
- completion-reward-4500
- reward-scale-10
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b222_l13_b214erepeatresume_100k_ultrahold4500_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B214 repeat step-100000 from run b214_l13_b191resume_200k_freezemid4500_s80_20260628T193622Z, equivalent to about 4.7M total B166+B178+B191+B214 steps, leaving 300k under the 5M cap. Keeps completion_reward=4500 and uses ultra-hold PPO settings: LR 2e-6->5e-7, ent_coef=0.0002->0.00002, n_epochs=2, batch_size=4096, clip_range=0.015, clip_range_vf=0.1, target_kl=0.01. Primary metric is peak train/info/level_complete/rate/min/last.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b214_l13_b191resume_200k_freezemid4500_s80_20260628T193622Z/checkpoints/ppo_supermariobros-nes-v0_100000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 2
  learning_rate: 2.0e-06
  learning_rate_final: 5.0e-07
  learning_rate_schedule_timesteps: 300000
  ent_coef: 0.0002
  ent_coef_final: 2.0e-05
  ent_coef_schedule_timesteps: 300000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.015
  clip_range_vf: 0.1
  target_kl: 0.01
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 4500
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 100000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 300000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
