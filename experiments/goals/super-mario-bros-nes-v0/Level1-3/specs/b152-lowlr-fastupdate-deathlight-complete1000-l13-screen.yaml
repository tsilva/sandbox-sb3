defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b152-lowlr-fastupdate-deathlight-complete1000-l13-screen
hypothesis: >-
  B147 crossed 3.4M steps with zero clean Level1-3 clears and no meaningful target-rate movement. The
  current low-LR/high-gamma variants mostly use long rollout horizons, which may be delaying PPO
  updates while the policy is still searching for the first safe jump timing. This arm keeps the low
  LR, high entropy, high gamma, low death pressure, and dominant clean-clear bonus, but returns to
  B55-style frequent PPO updates with n_steps=512 and batch_size=512. Seed 80 should either produce
  nonzero train/info/level_complete/from/0-2/count faster than the long-rollout low-LR arms, or show
  that frequent updates alone do not escape the zero-clear Level1-3 local optimum.
parent_spec_slug: b150-lowlr-explore-death0-complete750-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b152-l13-lowlr-fastupdate-deathlight-complete1000-screen
wandb_tags:
- mario
- level1-3
- post21
- b152
- low-learning-rate
- fast-updates
- death-penalty-light
- minimal-progress-scale
- completion-reward-1000
- gamma-0995
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b152_l13_lowlr_fastupdate_deathlight_complete1000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B147 zero-clear plateau backfill using frequent PPO updates with n_steps=512, batch_size=512, LR 5e-5->3e-5, gamma=0.995, gae_lambda=0.98, ent_coef=0.05->0.01, normalize_advantage=true, target_kl=0.10, progress_reward_scale=0.02, death_penalty=2, completion_reward=1000, and score_progress_clipped=true to test whether long-rollout low-LR screens are updating too slowly during early jump exploration. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 5.0e-05
  learning_rate_final: 3.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.05
  ent_coef_final: 0.01
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.15
  target_kl: 0.1
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.02
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 2
  completion_reward: 1000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
