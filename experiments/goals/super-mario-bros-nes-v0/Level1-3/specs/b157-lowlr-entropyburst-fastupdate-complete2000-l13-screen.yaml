defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b157-lowlr-entropyburst-fastupdate-complete2000-l13-screen
hypothesis: >-
  B152 and B153 tested frequent PPO updates but still settled into zero-clear flat tails. If the
  remaining blocker is first-pit exploration rather than update cadence, the policy may need a much
  larger early entropy push while direct x-progress and death penalties stay small. This arm keeps
  fast updates, raises early entropy, removes explicit death penalty, keeps only a tiny clipped
  progress signal, and makes the first true clean clear dominate the return. Seed 80 should either
  produce nonzero train/info/level_complete/from/0-2/count earlier than prior fast-update arms, or
  show that entropy alone cannot discover safe Level1-3 jump timing under the current action/reward
  contract.
parent_spec_slug: b152-lowlr-fastupdate-deathlight-complete1000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b157-l13-lowlr-entropyburst-fastupdate-complete2000-screen
wandb_tags:
- mario
- level1-3
- post21
- b157
- low-learning-rate
- entropy-burst
- fast-updates
- tiny-clipped-progress
- death-penalty-zero
- completion-reward-2000
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b157_l13_lowlr_entropyburst_fastupdate_complete2000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B152/B153 zero-clear fast-update backfill using n_steps=512, batch_size=512, LR 7e-5->5e-5, gamma=0.995, gae_lambda=0.98, ent_coef=0.10->0.02, normalize_advantage=true, clip_range=0.15, target_kl=0.15, progress_reward_cap=10, progress_reward_scale=0.001, death_penalty=0, completion_reward=2000, and time_penalty=-0.001 to maximize early jump exploration while keeping the clear bonus dominant. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 5.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.1
  ent_coef_final: 0.02
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.15
  target_kl: 0.15
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.001
  terminal_reward: 50
  time_penalty: -0.001
  death_penalty: 0
  completion_reward: 2000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
