defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b158-sparse-longcredit-survival-complete2000-l13-screen
hypothesis: >-
  Most Level1-3 screens, including B151-B153, have learned some shaped-return behavior but no clean
  clears. This suggests even tiny progress shaping may be enough to distract PPO from the delayed
  platform objective. This arm removes score reward, keeps only a near-zero additive progress gradient
  plus a small survival bonus, uses a very large clean-clear bonus, and pushes gamma/GAE higher for
  delayed jump credit while preserving the same environment and termination contract. Seed 80 should
  either produce nonzero train/info/level_complete/from/0-2/count, or establish that an almost-sparse
  legal reward still cannot find the first clean Level1-3 trajectory without a broader jump/platform
  signal.
parent_spec_slug: b153-additive-survival-fastupdate-complete1000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b158-l13-sparse-longcredit-survival-complete2000-screen
wandb_tags:
- mario
- level1-3
- post21
- b158
- sparse-reward
- long-credit
- survival-bonus
- minimal-progress-scale
- completion-reward-2000
- gamma-0997
- high-entropy
- advantage-normalization
- screen
- beast3
run_name_template: b158_l13_sparse_longcredit_survival_complete2000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B151/B153 zero-clear survival plateau backfill using additive near-sparse reward, progress_reward_scale=0.0005, time_penalty=-0.003, death_penalty=1, completion_reward=2000, LR 5e-5->3e-5, n_steps=4096, batch_size=2048, gamma=0.997, gae_lambda=0.99, ent_coef=0.05->0.01, normalize_advantage=true, clip_range=0.12, target_kl=0.10, and vf_coef=0.5 to test delayed clean-clear credit with minimal x-progress lure. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 4096
  batch_size: 2048
  n_epochs: 10
  learning_rate: 5.0e-05
  learning_rate_final: 3.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.05
  ent_coef_final: 0.01
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.997
  gae_lambda: 0.99
  clip_range: 0.12
  target_kl: 0.1
  vf_coef: 0.5
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: additive
  progress_reward_cap: 10.0
  progress_reward_scale: 0.0005
  terminal_reward: 50
  time_penalty: -0.003
  death_penalty: 1
  completion_reward: 2000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
