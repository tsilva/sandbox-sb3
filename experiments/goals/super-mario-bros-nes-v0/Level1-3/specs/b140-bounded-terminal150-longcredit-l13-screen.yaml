defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b140-bounded-terminal150-longcredit-l13-screen
hypothesis: >-
  The score-mode screens keep finding shaped-progress plateaus with no clean Level1-3 clears. A
  bounded reward arm with a tighter progress cap and a large terminal clear/life-loss signal should
  test whether score/progress shaping itself is masking the sparse true-clear objective while
  preserving the same environment and event contract. Seed 80 should produce either a nonzero
  clean-clear count or an obviously different exploration/death/progress profile from the B132/B133
  score-mode plateau.
parent_spec_slug: b133-longrollout-gamma097-lowprogress-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b140-l13-bounded-terminal150-longcredit-screen
wandb_tags:
- mario
- level1-3
- post21
- b140
- bounded-reward
- terminal-reward-150
- tight-progress-cap
- long-rollout
- gamma-097
- advantage-normalization
- screen
- beast3
run_name_template: b140_l13_bounded_terminal150_longcredit_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B133 follow-up using reward_mode=bounded, progress_reward_cap=10, terminal_reward=150, reward_scale=10, n_steps=1024, gamma=0.97, gae_lambda=0.95, normalize_advantage=true, and ent_coef_final=0.003 to reduce score-mode progress plateauing. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 1024
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.003
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.97
  gae_lambda: 0.95
  clip_range: 0.15
  target_kl: 0.14
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: bounded
  progress_reward_cap: 10.0
  progress_reward_scale: 1.0
  terminal_reward: 150
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 0
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
