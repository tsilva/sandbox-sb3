defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b159-lowlr-microupdate-entropyburst-complete2500-l13-screen
hypothesis: >-
  B154 crossed the 2.5M checkpoint with zero clean Level1-3 clears and a very flat reward tail while
  still spending most reward mass on progress. B152-B154 showed that 512-step fast updates were not
  enough by themselves. This arm keeps the same Level1-3 environment and action semantics but shortens
  PPO rollouts further to n_steps=256, keeps high early entropy, removes explicit death pressure,
  nearly removes x-progress reward, and makes the true clean clear overwhelmingly dominant. Seed 80
  should either produce nonzero train/info/level_complete/from/0-2/count before prior fast-update
  arms, or show that even very frequent high-entropy PPO updates cannot discover safe Level1-3 jump
  timing under the current legal reward/hyperparameter scope.
parent_spec_slug: b157-lowlr-entropyburst-fastupdate-complete2000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b159-l13-lowlr-microupdate-entropyburst-complete2500-screen
wandb_tags:
- mario
- level1-3
- post21
- b159
- low-learning-rate
- micro-updates
- entropy-burst
- tiny-clipped-progress
- death-penalty-zero
- completion-reward-2500
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b159_l13_lowlr_microupdate_entropyburst_complete2500_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B154 zero-clear raw-progress plateau backfill using micro PPO updates with n_steps=256, batch_size=256, LR 7e-5->5e-5, gamma=0.995, gae_lambda=0.98, ent_coef=0.10->0.02, normalize_advantage=true, clip_range=0.12, target_kl=0.12, progress_reward_cap=5, progress_reward_scale=0.0005, death_penalty=0, completion_reward=2500, and time_penalty=-0.001 to test whether extremely frequent high-entropy updates can find the first clean Level1-3 trajectory. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 256
  batch_size: 256
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 5.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.1
  ent_coef_final: 0.02
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.12
  target_kl: 0.12
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 5.0
  progress_reward_scale: 0.0005
  terminal_reward: 50
  time_penalty: -0.001
  death_penalty: 0
  completion_reward: 2500
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
