run_name_template: b181_l13_b177resume_4000k_consolidate_complete5000_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes the B177 step-4000000 checkpoint after critic-XL has produced clean clears, leaving 1M steps under the 5M cap. Keeps B177 critic-XL architecture with policy_net_arch=64,64, value_net_arch=1024,1024, vf_coef=0.75, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, time_penalty=-0.002, gamma=0.995, gae_lambda=0.98, normalize_advantage=true, raises completion_reward to 5000, and uses stabilization settings: LR 3e-5->1e-5, ent_coef=0.01->0.001, n_epochs=6, batch_size=2048, clip_range=0.08, clip_range_vf=0.15, target_kl=0.06. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b177_l13_lowlr_criticxl_survival_complete3000_s80_20260628T172441Z/checkpoints/ppo_supermariobros-nes-v0_4000000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 2048
  n_epochs: 6
  learning_rate: 3.0e-05
  learning_rate_final: 1.0e-05
  learning_rate_schedule_timesteps: 1000000
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 1000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.08
  clip_range_vf: 0.15
  target_kl: 0.06
  vf_coef: 0.75
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 1024,1024
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 5000
