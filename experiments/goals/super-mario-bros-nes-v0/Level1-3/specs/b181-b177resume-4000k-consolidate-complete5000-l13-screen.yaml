schema_version: 1
slug: b181-b177resume-4000k-consolidate-complete5000-l13-screen
hypothesis: >-
  B177's critic-XL policy discovered clean Level1-3 clears, but the rolling completion window remained
  sparse and the shaped reward tail fell after the first clear burst. B181 resumes the B177 4.0M
  checkpoint with the same stabilization settings as B180, but raises the clean-clear bonus to 5000.
  This isolates whether the already-discovered post-bottleneck behavior is still underweighted once
  the policy has crossed the hard initial platform sequence. Seed 80 should preserve B177's
  post-bottleneck behavior and improve clear density or peak train/info/level_complete/rate/min/last
  relative to B180 and B177's original continuation. If shaped reward rises without completion-rate
  improvement, sparse clear magnitude is not the consolidation lever.
parent_spec_slug: b177-lowlr-criticxl-survival-complete3000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b181-l13-b177resume-4000k-consolidate-complete5000-screen
wandb_tags:
- mario
- level1-3
- post21
- b181
- b177-resume
- checkpoint-4000000
