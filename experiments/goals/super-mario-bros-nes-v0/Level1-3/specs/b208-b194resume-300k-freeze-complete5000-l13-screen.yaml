run_name_template: b208_l13_b194resume_300k_freeze_complete5000_s{seed}_{utc}
run_description_template: Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B194 step-300000, equivalent to about 4.6M total B166+B178+B194 steps, leaving 400k under the 5M cap. Keeps completion_reward=5000 and freezes with LR 5e-6->2e-6, ent_coef=0.0005->0.0001, n_epochs=4, batch_size=4096, clip_range=0.03, clip_range_vf=0.2, target_kl=0.02. Primary metric is peak train/info/level_complete/rate/min/last.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b194_l13_b178resume_1300k_clearboost5000_s80_20260628T184522Z/checkpoints/ppo_supermariobros-nes-v0_300000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 4
  learning_rate: 5.0e-06
  learning_rate_final: 2.0e-06
  learning_rate_schedule_timesteps: 400000
  ent_coef: 0.0005
  ent_coef_final: 0.0001
  ent_coef_schedule_timesteps: 400000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.03
  clip_range_vf: 0.2
  target_kl: 0.02
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 5000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 100000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 400000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
