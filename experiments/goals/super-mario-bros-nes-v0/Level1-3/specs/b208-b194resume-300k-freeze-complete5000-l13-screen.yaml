schema_version: 1
slug: b208-b194resume-300k-freeze-complete5000-l13-screen
hypothesis: >-
  B194 did not match B191's window peak but accumulated 93 clean clears, among the better count
  signals. B208 resumes B194 at 300k with a low-update freeze while keeping completion_reward=5000,
  testing whether its higher clear count can become a denser rolling window. Seed 80 should turn
  B194's clear count into a higher rolling window, ideally exceeding 0.12. If count remains high but
  window remains low, this lineage is diffuse rather than reliable.
parent_spec_slug: b194-b178resume-1300k-clearboost5000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b208-l13-b194resume-300k-freeze-complete5000-screen
wandb_tags:
- mario
- level1-3
- post21
- b208
- b194-resume
- checkpoint-300000
- critic-wide
- freeze
