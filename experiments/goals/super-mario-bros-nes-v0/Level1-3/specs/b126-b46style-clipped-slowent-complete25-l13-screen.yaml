defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b126-b46style-clipped-slowent-complete25-l13-screen
hypothesis: >-
  If Level1-3 needs broader policy movement than low-KL B55 but B120's raw-progress reward is too
  dominated by x-progress, a B46-style target_kl=0.20 arm with clipped progress, slow entropy, and
  completion_reward=25 should test update pressure without the same reward imbalance. Seed 80 should
  outperform B120 on first nonzero train/info/level_complete/from/0-2/count or peak
  train/info/level_complete/from/0-2/rate while keeping approximate KL and clip fraction in a usable
  range.
parent_spec_slug: b120-b46style-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b126-l13-b46style-clipped-slowent-complete25-screen
wandb_tags:
- mario
- level1-3
- post21
- b126
- b46-style
- target-kl-020
- fixed-learning-rate
- clipped-progress
- slow-entropy-decay
- higher-entropy-floor
- completion-reward-25
- screen
- beast3
run_name_template: b126_l13_b46style_clipped_slowent_complete25_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B46-style fixed-LR target_kl=0.20 recipe with score_progress_clipped=true, slower entropy decay to ent_coef_final=0.001, and clean completion_reward=25. Primary metric is peak train/info/level_complete/rate/min/last, matching train/info/level_complete/from/0-2/rate once the source window is full; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.00015
  learning_rate_schedule_timesteps: 1
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.2
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 25
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
