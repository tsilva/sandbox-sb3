schema_version: 1
slug: b242-b191resume-200k-longcredit4250-ckpt25k-l13-screen
hypothesis: >-
  B236 with completion_reward=4250 is the first run to reach 0.14, but it only saved 100k-spaced
  checkpoints and collapsed by the final window. B242 repeats the exact B236 recipe with 25k
  checkpoints to test repeatability and capture checkpoints closer to the 198k high-water region. Seed
  80 should reproduce the 0.14 band or at least the B230 0.12-0.13 band, while producing
  175k/200k/225k checkpoints for future preservation forks.
parent_spec_slug: b236-b191resume-200k-longcredit4250-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b242-l13-b191resume-200k-longcredit4250-ckpt25k-screen
