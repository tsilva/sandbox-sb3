defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b144-b46lowprogress-timecomplete300-l13-screen
hypothesis: >-
  B139's time-pressure arm reached a high shaped-reward plateau without any clean Level1-3 transition.
  This arm keeps the historical B46 higher-update-pressure PPO shape, but drops progress pressure
  further, adds a small time penalty, and makes the true clean-clear bonus dominate the reward scale.
  Seed 80 should reveal whether higher policy movement plus lower progress shaping can escape the B139
  plateau and produce nonzero train/info/level_complete/from/0-2/count.
parent_spec_slug: b120-b46style-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b144-l13-b46lowprogress-timecomplete300-screen
wandb_tags:
- mario
- level1-3
- post21
- b144
- b46-style
- low-progress-scale
- time-pressure
- completion-reward-300
- no-advantage-normalization
- screen
- beast3
run_name_template: b144_l13_b46lowprogress_timecomplete300_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B139 zero-clear plateau follow-up using B46-style fixed LR and target_kl=0.20 with progress_reward_scale=0.10, score_progress_clipped=true, time_penalty=0.03, death_penalty=25, completion_reward=300, gamma=0.9, gae_lambda=1.0, and normalize_advantage=false. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.00015
  learning_rate_schedule_timesteps: 1
  ent_coef: 0.01
  ent_coef_final: 0.0003
  ent_coef_schedule_timesteps: 2000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.2
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 0.1
  terminal_reward: 50
  time_penalty: 0.03
  death_penalty: 25
  completion_reward: 300
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
