defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b164-lowlr-noadvnorm-antistall-complete3000-l13-screen
hypothesis: >-
  B161 crossed the 2M-step maturity point with zero clean Level1-3 clears and a nearly flat
  shaped-reward tail, so broader advantage-normalized anti-stall exploration is not enough by itself.
  B160 is still moving and is the only current Level1-style no-advantage-normalization arm, but it
  includes a small survival bonus and a weaker clean-clear bonus. This arm keeps direct Level1-3
  training and legal reward/hyperparameter-only changes, combines the successful Level1 PPO update
  geometry with high early entropy and long credit, removes the survival incentive, adds a light
  anti-stall penalty, and makes true clean clears overwhelmingly dominant. Seed 80 should either
  produce nonzero train/info/level_complete/from/0-2/count, or show that Level1-style unnormalized PPO
  advantages plus anti-stall reward shaping still cannot discover a clean Level1-3 trajectory under
  the current legal scope.
parent_spec_slug: b160-lowlr-noadvnorm-longcredit-complete1500-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b164-l13-lowlr-noadvnorm-antistall-complete3000-screen
wandb_tags:
- mario
- level1-3
- post21
- b164
- low-learning-rate
- no-advantage-normalization
- level1-ppo-geometry
- anti-stall
- high-entropy
- tiny-clipped-progress
- light-death-penalty
- completion-reward-3000
- gamma-0995
- screen
- beast3
run_name_template: b164_l13_lowlr_noadvnorm_antistall_complete3000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B161 zero-clear flat-tail backfill using Level1-style no advantage normalization with LR 7e-5->4e-5, n_steps=2048, batch_size=1024, gamma=0.995, gae_lambda=1.0, ent_coef=0.12->0.02, clip_range=0.15, target_kl=0.16, progress_reward_cap=5, progress_reward_scale=0.005, death_penalty=1, completion_reward=3000, and time_penalty=0.002 to test whether unnormalized Level1 PPO geometry plus anti-stall pressure can discover clean Level1-3 traversal. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 2048
  batch_size: 1024
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 4.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.12
  ent_coef_final: 0.02
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 5.0
  progress_reward_scale: 0.005
  terminal_reward: 50
  time_penalty: 0.002
  death_penalty: 1
  completion_reward: 3000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
