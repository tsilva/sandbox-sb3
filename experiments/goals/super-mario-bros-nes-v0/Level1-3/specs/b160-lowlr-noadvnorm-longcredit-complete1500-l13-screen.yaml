defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b160-lowlr-noadvnorm-longcredit-complete1500-l13-screen
hypothesis: >-
  B155 crossed the 2.5M-step maturity point with zero clean Level1-3 clears and a nearly flat
  shaped-reward tail. The confirmed Level1-1 B55 recipe used unnormalized PPO advantages, while most
  recent Level1-3 low-LR/high-gamma probes normalized advantages. This arm keeps direct Level1-3
  training and legal reward/hyperparameter-only changes, but tests the missing quadrant: Level1-style
  unnormalized PPO update geometry with Level1-3-specific low LR, higher early entropy, longer credit,
  tiny progress pressure, light death pressure, and a dominant true clean-clear bonus. Seed 80 should
  either produce nonzero train/info/level_complete/from/0-2/count, or show that the Level1-style
  no-advantage-normalization PPO geometry also falls into the zero-clear Level1-3 plateau under low LR
  and high entropy.
parent_spec_slug: b155-lowlr-gentlepress-tinyprogress-complete1500-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b160-l13-lowlr-noadvnorm-longcredit-complete1500-screen
wandb_tags:
- mario
- level1-3
- post21
- b160
- low-learning-rate
- no-advantage-normalization
- level1-ppo-geometry
- long-credit
- high-entropy
- tiny-clipped-progress
- light-death-penalty
- completion-reward-1500
- gamma-0995
- screen
- beast3
run_name_template: b160_l13_lowlr_noadvnorm_longcredit_complete1500_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B155 zero-clear flat-reward backfill using Level1-style no advantage normalization with LR 7e-5->4e-5, n_steps=2048, batch_size=1024, gamma=0.995, gae_lambda=1.0, ent_coef=0.08->0.01, clip_range=0.15, target_kl=0.16, progress_reward_cap=10, progress_reward_scale=0.01, death_penalty=2, completion_reward=1500, and time_penalty=-0.001 to test whether the successful Level1 PPO update geometry helps direct Level1-3 jump exploration. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 2048
  batch_size: 1024
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 4.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.08
  ent_coef_final: 0.01
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.01
  terminal_reward: 50
  time_penalty: -0.001
  death_penalty: 2
  completion_reward: 1500
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
