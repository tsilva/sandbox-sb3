defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b165-lowlr-criticwide-antistall-complete3000-l13-screen
hypothesis: >-
  B156 is the first active Level1-3 screen to produce real clean completions, reaching nonzero
  train/info/level_complete/from/0-2/count before the 5M cap. That points toward the critic-wide,
  low-LR, long-credit setup as useful delayed-jump credit support, but B156 still has only a low
  completion rate and includes a small survival incentive. This arm keeps the B156 critic-wide
  architecture and low-pressure PPO shape, removes the survival incentive, adds light anti-stall
  pressure, modestly raises early entropy, and makes true clean clears overwhelmingly dominant. Seed
  80 should beat B156's early nonzero-clear signal by producing Level1-3 completions earlier or at a
  higher train/info/level_complete/from/0-2/rate. If it stays at zero while B156 keeps clearing, the
  survival/gentler entropy shape in B156 is likely carrying the useful behavior rather than the
  anti-stall clear bonus.
parent_spec_slug: b156-lowlr-criticwide-tinyprogress-complete1500-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b165-l13-lowlr-criticwide-antistall-complete3000-screen
wandb_tags:
- mario
- level1-3
- post21
- b165
- low-learning-rate
- critic-wide
- anti-stall
- moderate-high-entropy
- tiny-clipped-progress
- light-death-penalty
- completion-reward-3000
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b165_l13_lowlr_criticwide_antistall_complete3000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B156 first-clear follow-up using policy_net_arch=64,64, value_net_arch=512,512, LR 7e-5->5e-5, n_steps=1024, batch_size=1024, gamma=0.995, gae_lambda=0.98, ent_coef=0.08->0.01, normalize_advantage=true, clip_range=0.12, clip_range_vf=0.2, target_kl=0.12, vf_coef=0.5, progress_reward_cap=5, progress_reward_scale=0.003, death_penalty=1, completion_reward=3000, and time_penalty=0.002 to test whether the critic-wide delayed-credit signal improves when true clears dominate and waiting is discouraged. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 1024
  n_epochs: 10
  learning_rate: 7.0e-05
  learning_rate_final: 5.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.08
  ent_coef_final: 0.01
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.12
  clip_range_vf: 0.2
  target_kl: 0.12
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 5.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: 0.002
  death_penalty: 1
  completion_reward: 3000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
