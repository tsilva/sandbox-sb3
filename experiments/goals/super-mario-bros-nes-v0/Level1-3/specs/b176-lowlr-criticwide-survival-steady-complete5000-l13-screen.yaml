defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b176-lowlr-criticwide-survival-steady-complete5000-l13-screen
hypothesis: >-
  B166/B171/B172 prove that the critic-wide survival family discovers Level1-3 clears, but the rolling
  completion rate remains sparse. B176 keeps B175's steadier PPO geometry and raises only the true
  clean-clear bonus to 5000 to test whether the sparse completion event is still underweighted once
  PPO update pressure is reduced. Seed 80 should increase clear density versus B175 if the policy
  needs a stronger target-aligned sparse event. If B176 inflates reward without improving
  train/info/level_complete/rate/min/last, completion magnitude is not the missing lever.
parent_spec_slug: b166-lowlr-criticwide-survival-complete3000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b176-l13-lowlr-criticwide-survival-steady-complete5000-screen
wandb_tags:
- mario
- level1-3
- post21
- b176
- critic-wide
- steady-ppo
- low-learning-rate
- tiny-clipped-progress
- survival-bonus
- completion-reward-5000
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b176_l13_lowlr_criticwide_survival_steady_complete5000_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B166/B175 sparse-clear-weight follow-up using policy_net_arch=64,64, value_net_arch=512,512, LR 5e-5->1e-5, n_steps=1024, batch_size=2048, n_epochs=6, gamma=0.995, gae_lambda=0.98, ent_coef=0.03->0.001, normalize_advantage=true, clip_range=0.08, clip_range_vf=0.15, target_kl=0.06, vf_coef=0.5, progress_reward_cap=10, progress_reward_scale=0.003, death_penalty=1, completion_reward=5000, and time_penalty=-0.002. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 2048
  n_epochs: 6
  learning_rate: 5.0e-05
  learning_rate_final: 1.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.03
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.08
  clip_range_vf: 0.15
  target_kl: 0.06
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 5000
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 250000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
