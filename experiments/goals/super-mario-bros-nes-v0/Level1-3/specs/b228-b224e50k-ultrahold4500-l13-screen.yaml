defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b228-b224e50k-ultrahold4500-l13-screen
hypothesis: >-
  B224e reached the B224 0.12 band and had the best live final window among B224 copies before
  completion. B228 resumes B224e at 50k with ultra-hold PPO, testing whether the stronger late-window
  dense-checkpoint parent can preserve the pre-peak behavior better than B224a/B224b 50k forks. Seed
  80 should match or exceed the 0.12 B224e peak and improve final
  train/info/level_complete/rate/min/last. If it underperforms B225/B227, parent final-window quality
  was not predictive.
parent_spec_slug: b224-b191resume-200k-freezemid4500-ckpt50k-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b228-l13-b224e50k-ultrahold4500-screen
wandb_tags:
- mario
- level1-3
- post21
- b228
- b224-resume
- checkpoint-50000
- critic-wide
- ultrahold
- completion-reward-4500
- reward-scale-10
- gamma-0995
- advantage-normalization
- screen
- beast3
run_name_template: b228_l13_b224e50k_ultrahold4500_s{seed}_{utc}
run_description_template: 'Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B224e step-50000, equivalent to about 4.65M total B166+B178+B191+B224 steps, leaving 350k under the 5M cap. Keeps completion_reward=4500 and uses ultra-hold PPO settings: LR 2e-6->5e-7, ent_coef=0.0002->0.00002, n_epochs=2, batch_size=4096, clip_range=0.015, clip_range_vf=0.1, target_kl=0.01. Primary metric is peak train/info/level_complete/rate/min/last.'
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b224_l13_b191resume_200k_freezemid4500_ckpt50k_s80_20260628T195100Z/checkpoints/ppo_supermariobros-nes-v0_50000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 2
  learning_rate: 2.0e-06
  learning_rate_final: 5.0e-07
  learning_rate_schedule_timesteps: 350000
  ent_coef: 0.0002
  ent_coef_final: 2.0e-05
  ent_coef_schedule_timesteps: 350000
  gamma: 0.995
  gae_lambda: 0.98
  clip_range: 0.015
  clip_range_vf: 0.1
  target_kl: 0.01
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 4500
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 50000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 350000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
