schema_version: 1
slug: b186-b178resume-1600k-clearboost-complete4000-l13-screen
hypothesis: >-
  The B178/B184 lineage suggests a stronger clean-clear reward helps completion density, but
  completion_reward=5000 also keeps critic diagnostics unhealthy. B186 resumes B178 at 1.6M like B185,
  but uses an intermediate completion_reward=4000 to test whether a smaller clear boost can retain the
  higher rolling completion signal with less value-function stress. Seed 80 should land between B183
  and B185/B184: better completion density than completion_reward=3000 while avoiding the worst
  value-loss behavior of completion_reward=5000. Promotion still requires the goal's 100/100 metric,
  not reward.
parent_spec_slug: b178-b166resume-3000k-stablediscovery-complete3000-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b186-l13-b178resume-1600k-clearboost-complete4000-screen
