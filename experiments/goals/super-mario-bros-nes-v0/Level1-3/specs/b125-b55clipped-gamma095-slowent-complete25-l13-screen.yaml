defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b125-b55clipped-gamma095-slowent-complete25-l13-screen
hypothesis: >-
  Level1-3 may need a longer effective credit horizon than the Level1-1 B55 gamma=0.9 recipe;
  gamma=0.95 with clipped progress, slow entropy, and clean completion reward should better credit
  survival/path choices that precede the clear. Seed 80 should improve first nonzero clear timing or
  late train/info/level_complete/from/0-2/rate versus the gamma=0.9 clipped-progress arms without
  destabilizing PPO.
parent_spec_slug: b124-b55clipped-slowent-complete50-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b125-l13-b55clipped-gamma095-slowent-complete25-screen
wandb_tags:
- mario
- level1-3
- post21
- b125
- b55-transfer
- clipped-progress
- gamma-095
- slow-entropy-decay
- higher-entropy-floor
- completion-reward-25
- low-update-pressure
- screen
- beast3
run_name_template: b125_l13_b55clipped_gamma095_slowent_complete25_s{seed}_{utc}
run_description_template: Single-seed Beast3 screen for Level1-3 100/100, seed {seed}; B55 low-KL late-LR-decay recipe with score_progress_clipped=true, gamma=0.95, slower entropy decay to ent_coef_final=0.001, and clean completion_reward=25. Primary metric is peak train/info/level_complete/rate/min/last, matching train/info/level_complete/from/0-2/rate once the source window is full; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.95
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 25
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
