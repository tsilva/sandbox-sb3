schema_version: 1
slug: b244-b236resume-100k-rescale4250-l13-screen
hypothesis: >-
  B241's early B236-200k reward-scale reduction is competitive, but it starts after the B236 peak
  window. B244 resumes from B236 100k and raises reward_scale to 12 earlier, testing whether a lower
  effective reward magnitude can guide the policy through the 198k high-window without the later
  collapse. Seed 80 should preserve useful completion while reducing post-peak collapse. A weaker peak
  but stronger final window would support reward-scale reduction as a stability lever.
parent_spec_slug: b236-b191resume-200k-longcredit4250-l13-screen
seeds:
- 80
run_target: rtx4090
wandb_group: b244-l13-b236resume-100k-rescale4250-screen
wandb_tags:
- mario
- level1-3
- post21
- b244
- b236-resume
- checkpoint-100000
- critic-wide
- longcredit
- completion-reward-4250
- reward-scale-12
- gamma-0997
- gae-099
- advantage-normalization
- screen
- beast3
run_name_template: b244_l13_b236resume_100k_rescale4250_s{seed}_{utc}
run_description_template: Single-seed Beast3 checkpoint fork for Level1-3 100/100, seed {seed}; resumes B236 step-100000, equivalent to about 4.7M total B166+B178+B191+B236 steps, leaving 300k under the 5M cap. Keeps completion_reward=4250 and long-credit PPO, but raises reward_scale to 12 earlier than B241. Primary metric is peak train/info/level_complete/rate/min/last.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  resume: /root/rlab/runs/b236_l13_b191resume_200k_longcredit4250_s80_20260628T201807Z/checkpoints/ppo_supermariobros-nes-v0_100000_steps
  game: SuperMarioBros-Nes-v0
  state: Level1-3
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 4
  learning_rate: 3.0e-06
  learning_rate_final: 1.0e-06
  learning_rate_schedule_timesteps: 300000
  ent_coef: 0.0003
  ent_coef_final: 5.0e-05
  ent_coef_schedule_timesteps: 300000
  gamma: 0.997
  gae_lambda: 0.99
  clip_range: 0.025
  clip_range_vf: 0.2
  target_kl: 0.015
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.003
  terminal_reward: 50
  time_penalty: -0.002
  death_penalty: 1
  completion_reward: 4250
  reward_scale: 12
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 50000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 300000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
