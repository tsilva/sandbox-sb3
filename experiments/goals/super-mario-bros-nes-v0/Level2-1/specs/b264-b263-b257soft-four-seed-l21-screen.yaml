run_name_template: b264_l21_b257soft_s{seed}_{utc}
run_description_template: Four-seed Beast3 screen for World 2-1 100/100, seed {seed}; same B257 soft-update no-completion-bonus recipe as B263, launched to test seed variance rather than judging Level2-1 from seed 90 alone. Primary metric is peak train/info/level_complete/rate/min/last, matching train/info/level_complete/from/1-0/rate once the source window is full; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 1.0
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
