# Hydra composition list; imports the shared Mario goal contract first.
defaults:
# Shared Mario base; composes the reusable env and supplies success/eval defaults.
- ../_base@_global_
# Apply this file after the base; lets Level2-1 define its state, evidence, and defaults.
- _self_
# Goal id; must match the directory so tools can address this contract unambiguously.
goal_id: Level2-1
# Human-readable title; helps reports and operators identify the goal quickly.
title: Sample-efficient SuperMarioBros-NES World 2-1 completion
# Goal-specific train environment overlay; only the source state differs from the shared Mario env.
train:
  environment:
    # Stable Retro state id; Level2-1 is the only source for this goal.
    env_config:
      state: Level2-1
