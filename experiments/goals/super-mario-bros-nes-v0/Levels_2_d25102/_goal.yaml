# Hydra composition list; imports the shared Mario goal contract first.
defaults:
# Shared Mario base; composes the reusable env and supplies success/eval defaults.
- ../_base@_global_
# Apply this file after the base; lets the mixed-level discovery goal define its train environment overlay.
- _self_
# Goal id; must match the directory so tools can address this contract unambiguously.
goal_id: Levels_2_d25102
# Human-readable title; makes clear this is a mixed Level1-1/Level1-2 recipe search.
title: SuperMarioBros-NES Level1-1/Level1-2 mixed-policy high-watermark recipe search
# Goal-specific train environment overlay; changes the shared single-state contract into a two-state distribution.
train:
  environment:
    # Stable Retro state ids; both Level1-1 and Level1-2 contribute to the bottleneck metric.
    env_config:
      states:
      - Level1-1
      - Level1-2
