schema_version: 1
kind: train_experiment
defaults:
- ../_goal@goal
- ../../../../history/recipes/mario/b87-mixed-l11l12-lowpress@_global_
- _self_
slug: b87-lowpress-l11l12-two-seed
hypothesis: >-
  Lower PPO update pressure should make the transient balanced Level1-1/Level1-2 behavior found by b86
  more reproducible across seeds. Both seeds should maximize peak
  train/info/level_complete/rate/min/last, with Level1-2 no longer acting as a one-seed-only
  bottleneck.
parent_spec_slug: b86-b74current-l11l12-latest-five-seed
seeds:
- 198
- 199
run_target: rtx4090
wandb_group: b87-l11l12-lowpress-two-seed
wandb_tags:
- mario
- level1-1
- level1-2
- mixed-level
- b87
- low-update-pressure
- task-conditioning
- per-task-advantage
- beast3
run_name_template: b87_l11l12_lowpress_s{seed}_{utc}
run_description_template: Two-seed Beast3 search batch for Level1-1/Level1-2 mixed PPO high-watermark, seed {seed}; b86 base with lower target_kl and late LR decay, primary optimization metric is peak train/info/level_complete/rate/min/last; train/info/level_complete/rate/mean/last is a companion signal.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 0.8
  threshold_operator: '>'
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - max(train/info/level_complete/from/0-1/rate)
  - max(train/info/level_complete/from/0-0/rate)
  - earlier_peak_step
  training_metrics: selection_high_watermark
