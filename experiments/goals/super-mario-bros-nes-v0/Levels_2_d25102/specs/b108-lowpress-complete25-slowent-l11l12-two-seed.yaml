defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b108-lowpress-complete25-slowent-l11l12-two-seed
hypothesis: >-
  B91 is the first active recipe where both seeds are climbing into mid-range balanced competence, but
  one seed is Level1-1 bottlenecked and the other is Level1-2 bottlenecked. Keeping the B91 50/50
  state sampling while slowing entropy decay should preserve more action diversity long enough for
  both level policies to co-exist instead of specializing. Both seeds should maximize peak
  train/info/level_complete/rate/min/last, with smoother growth than B91 and less late one-level
  collapse than B89.
parent_spec_slug: b91-lowpress-complete25-l11l12-two-seed
seeds:
- 204
- 205
run_target: rtx4090
wandb_group: b108-l11l12-lowpress-complete25-slowent-two-seed
wandb_tags:
- mario
- level1-1
- level1-2
- mixed-level
- b108
- low-update-pressure
- completion-reward-25
- slow-entropy-decay
- higher-entropy-floor
- task-conditioning
- per-task-advantage
- beast3
run_name_template: b108_l11l12_lowpress_complete25_slowent_s{seed}_{utc}
run_description_template: Two-seed Beast3 search batch for Level1-1/Level1-2 mixed PPO high-watermark, seed {seed}; B91 plus slower entropy decay and higher entropy floor at 50/50 Level1-1/Level1-2 sampling, primary optimization metric is peak train/info/level_complete/rate/min/last; train/info/level_complete/rate/mean/last is a companion signal.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 0.8
  threshold_operator: '>'
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - max(train/info/level_complete/from/0-1/rate)
  - max(train/info/level_complete/from/0-0/rate)
  - earlier_peak_step
  training_metrics: selection_high_watermark
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-1
  states:
  - Level1-1
  - Level1-2
  state_probs:
  - 0.5
  - 0.5
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  clip_range_vf: 0.2
  target_kl: 0.16
  vf_coef: 0.5
  adam_eps: 1.0e-08
  normalize_advantage: false
  advantage_normalization: per-task
  policy_net_arch: 64,64
  value_net_arch: 512,512
  reward_mode: score
  terminal_reward: 50
  death_penalty: 25
  completion_reward: 25
  reward_scale: 10
  score_progress_clipped: true
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  task_conditioning: true
  task_conditioning_info_vars:
  - levelHi
  - levelLo
  task_conditioning_info_values:
  - - 0
    - 0
  - - 0
    - 1
  - - 0
    - 2
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
