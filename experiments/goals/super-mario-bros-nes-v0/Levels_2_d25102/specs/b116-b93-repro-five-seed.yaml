defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b116-b93-repro-five-seed
hypothesis: >-
  The B93 slow-entropy, Level1-2-biased recipe should reproduce its balanced high-watermark
  performance across five fresh seeds beyond the winning 200/201 pair. Most or all fresh seeds should
  maximize peak train/info/level_complete/rate/min/last within the 5M cap, with failures analyzed by
  whether Level1-1 or Level1-2 becomes the bottleneck.
parent_spec_slug: b93-slowent-l12bias-l11l12-two-seed
seeds:
- 208
- 209
- 210
- 211
- 212
run_target: rtx4090
wandb_group: b116-b93-repro-five-seed
wandb_tags:
- mario
- level1-1
- level1-2
- mixed-level
- b116
- b93-repro
- five-seed
- slow-entropy-decay
- higher-entropy-floor
- l12-sampling-bias
- task-conditioning
- per-task-advantage
- beast3
run_name_template: b116_l11l12_b93repro_s{seed}_{utc}
run_description_template: Five-seed Beast3 confirmation/repro batch for the B93 Level1-1/Level1-2 mixed PPO recipe, seed {seed}; same slow entropy, 40/60 Level1-1/Level1-2 sampling, target_kl=0.20, clip_range=0.15, and no completion reward. Judge by peak train/info/level_complete/rate/min/last, with train/info/level_complete/rate/mean/last as a companion signal within 5M steps, not final value or early stopping.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 0.8
  threshold_operator: '>'
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - max(train/info/level_complete/from/0-1/rate)
  - max(train/info/level_complete/from/0-0/rate)
  - earlier_peak_step
  - lower_peak_instability_after_crossing
  training_metrics: selection_high_watermark
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-1
  states:
  - Level1-1
  - Level1-2
  state_probs:
  - 0.4
  - 0.6
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.00015
  learning_rate_schedule_timesteps: 1
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  clip_range_vf: 0.2
  target_kl: 0.2
  vf_coef: 0.5
  adam_eps: 1.0e-08
  normalize_advantage: false
  advantage_normalization: per-task
  policy_net_arch: 64,64
  value_net_arch: 512,512
  reward_mode: score
  terminal_reward: 50
  death_penalty: 25
  reward_scale: 10
  score_progress_clipped: true
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  task_conditioning: true
  task_conditioning_info_vars:
  - levelHi
  - levelLo
  task_conditioning_info_values:
  - - 0
    - 0
  - - 0
    - 1
  - - 0
    - 2
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
