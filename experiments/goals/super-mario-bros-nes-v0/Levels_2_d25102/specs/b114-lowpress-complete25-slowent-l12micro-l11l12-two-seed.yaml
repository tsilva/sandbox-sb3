defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b114-lowpress-complete25-slowent-l12micro-l11l12-two-seed
hypothesis: >-
  B91 proved the low-pressure completion-reward recipe can reach the strict threshold on one seed, but
  seed 207 and B110 both lose Level1-2 after early competence. B112 tests only a tiny Level1-2
  sampling nudge. This arm keeps that small sampling nudge and B91's faster PPO pressure, while
  slowing entropy decay to preserve enough exploration for Level1-2 retention after 2-3M steps. Both
  seeds should maximize peak train/info/level_complete/rate/min/last, or at minimum seed 207 should
  exceed B91's 0.67 high-watermark with less Level1-2 collapse after the peak.
parent_spec_slug: b112-lowpress-complete25-l12micro-l11l12-two-seed
seeds:
- 206
- 207
run_target: rtx4090
wandb_group: b114-l11l12-lowpress-complete25-slowent-l12micro-two-seed
wandb_tags:
- mario
- level1-1
- level1-2
- mixed-level
- b114
- low-update-pressure
- completion-reward-25
- slow-entropy-decay
- micro-l12-sampling-bias
- task-conditioning
- per-task-advantage
- beast3
run_name_template: b114_l11l12_lowpress_complete25_slowent_l12micro_s{seed}_{utc}
run_description_template: Two-seed Beast3 search batch for Level1-1/Level1-2 mixed PPO high-watermark, seed {seed}; preserves B91 target_kl=0.16, clip_range=0.15, completion_reward=25, and 48/52 Level1-1/Level1-2 sampling, but slows entropy decay to final ent_coef=0.001 over 4M steps to reduce late Level1-2 collapse. Primary optimization metric is peak train/info/level_complete/rate/min/last; train/info/level_complete/rate/mean/last is a companion signal.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 0.8
  threshold_operator: '>'
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - max(train/info/level_complete/from/0-1/rate)
  - max(train/info/level_complete/from/0-0/rate)
  - earlier_peak_step
  training_metrics: selection_high_watermark
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-1
  states:
  - Level1-1
  - Level1-2
  state_probs:
  - 0.48
  - 0.52
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  clip_range_vf: 0.2
  target_kl: 0.16
  vf_coef: 0.5
  adam_eps: 1.0e-08
  normalize_advantage: false
  advantage_normalization: per-task
  policy_net_arch: 64,64
  value_net_arch: 512,512
  reward_mode: score
  terminal_reward: 50
  death_penalty: 25
  completion_reward: 25
  reward_scale: 10
  score_progress_clipped: true
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  task_conditioning: true
  task_conditioning_info_vars:
  - levelHi
  - levelLo
  task_conditioning_info_values:
  - - 0
    - 0
  - - 0
    - 1
  - - 0
    - 2
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
