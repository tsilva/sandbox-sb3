defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b252-clipped-slowent-complete100-l14-screen
hypothesis: >-
  World 1-4 may need broader exploration and less raw score-progress domination than the conservative
  B55 shape; clipped progress with a slower entropy decay and target_kl=0.20 tests update pressure
  without changing task semantics. Seed 90 should outperform B250/B251 on first nonzero
  train/info/level_complete/from/0-3/count or peak train/info/level_complete/from/0-3/rate while
  keeping approximate KL and clip fraction in a usable PPO range.
parent_spec_slug: b126-b46style-clipped-slowent-complete25-l13-screen
seeds:
- 90
run_target: rtx4090
wandb_group: b252-l14-clipped-slowent-complete100-screen
wandb_tags:
- mario
- level1-4
- world1-4
- post21
- b252
- target-kl-020
- fixed-learning-rate
- clipped-progress
- slow-entropy-decay
- completion-reward-100
- screen
- beast3
run_name_template: b252_l14_clipped_slowent_complete100_s{seed}_{utc}
run_description_template: Single-seed Beast3 scratch screen for World 1-4 100/100, seed {seed}; clipped progress, target_kl=0.20, fixed LR, slower entropy decay, and clean completion_reward=100. Primary metric is peak train/info/level_complete/rate/min/last, matching train/info/level_complete/from/0-3/rate once the source window is full; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 1.0
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-4
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.00015
  learning_rate_schedule_timesteps: 1
  ent_coef: 0.01
  ent_coef_final: 0.001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.2
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 100
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
