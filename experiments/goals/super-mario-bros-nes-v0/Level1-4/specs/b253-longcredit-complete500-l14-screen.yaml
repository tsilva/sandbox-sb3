defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b253-longcredit-complete500-l14-screen
hypothesis: >-
  World 1-4 is likely a sparse, delayed-credit castle task. A longer-credit PPO setup with clipped
  progress, advantage normalization, wider critic, reduced death pressure, and a stronger
  clean-completion reward tests whether scratch learning needs credit assignment rather than more raw
  x-progress pressure. Seed 90 should improve late training clean-completion count/rate or max
  x-position over the B250-B252 family without PPO collapse; if completion remains zero but x-progress
  improves, this arm identifies a useful follow-up region.
parent_spec_slug: b230-b191resume-200k-longcredit4500-l13-screen
seeds:
- 90
run_target: rtx4090
wandb_group: b253-l14-longcredit-complete500-screen
wandb_tags:
- mario
- level1-4
- world1-4
- post21
- b253
- longcredit
- completion-reward-500
- reward-scale-10
- gamma-0997
- gae-099
- advantage-normalization
- critic-wide
- screen
- beast3
run_name_template: b253_l14_longcredit_complete500_s{seed}_{utc}
run_description_template: Single-seed Beast3 scratch long-credit screen for World 1-4 100/100, seed {seed}; gamma=0.997, gae_lambda=0.99, n_steps=1024, batch_size=4096, clipped low progress, wide critic, advantage normalization, death_penalty=5, and clean completion_reward=500. Primary metric is peak train/info/level_complete/rate/min/last.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 1.0
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-4
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 1024
  batch_size: 4096
  n_epochs: 6
  learning_rate: 5.0e-05
  learning_rate_final: 1.0e-05
  learning_rate_schedule_timesteps: 5000000
  ent_coef: 0.003
  ent_coef_final: 0.0003
  ent_coef_schedule_timesteps: 5000000
  gamma: 0.997
  gae_lambda: 0.99
  clip_range: 0.08
  clip_range_vf: 0.3
  target_kl: 0.04
  vf_coef: 0.5
  adam_eps: 1.0e-08
  policy_net_arch: 64,64
  value_net_arch: 512,512
  normalize_advantage: true
  reward_mode: score
  progress_reward_cap: 10.0
  progress_reward_scale: 0.01
  terminal_reward: 50
  time_penalty: -0.001
  death_penalty: 5
  completion_reward: 500
  reward_scale: 10
  score_progress_clipped: true
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
