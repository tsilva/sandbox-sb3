defaults:
- ../_goal@goal
- _self_
schema_version: 1
slug: b255-b250-post21-four-seed-l14-confirm
hypothesis: >-
  The B250 no-completion-bonus B55 low-KL scratch recipe can reproduce strict 100/100 World 1-4
  completion under the active post21 runtime across the remaining goal confirmation seeds. Seeds 91-94
  should reach the strict 100/100 Level1-4 source-attempt completion window. Together with the already
  succeeded seed 90 B250 screen run, this completes the goal-defined five-seed train confirmation set
  before out-of-process eval promotion.
parent_spec_slug: b250-b55post21-l14-screen
seeds:
- 91
- 92
- 93
- 94
run_target: rtx4090
wandb_group: b255-l14-b250-post21-four-seed-confirm
wandb_tags:
- mario
- level1-4
- world1-4
- post21
- b255
- b250
- b55-transfer
- no-completion-bonus
- confirm
- four-seed
- beast3
run_name_template: b255_l14_b250post21_s{seed}_{utc}
run_description_template: Four-seed Beast3 profileless confirmation of the B250 no-completion-bonus B55 low-KL World 1-4 recipe under post21, seed {seed}; seed 90 already succeeded as B250. Target is strict 100/100 Level1-4 source-attempt completion.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 1.0
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-4
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.0001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 0.0
  reward_scale: 10
  score_progress_clipped: false
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
