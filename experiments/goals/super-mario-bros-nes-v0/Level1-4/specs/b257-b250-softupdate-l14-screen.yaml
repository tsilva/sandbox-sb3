run_name_template: b257_l14_softupdate_s{seed}_{utc}
run_description_template: Single-seed Beast3 robustness screen for World 1-4 100/100, seed {seed}; B250 reward with LR 1.2e-4->8e-5, clip_range=0.12, target_kl=0.10. Primary metric is peak train/info/level_complete/rate/min/last; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  threshold: 1.0
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  training_metrics: primary_optimization_signal
