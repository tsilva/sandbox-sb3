slug: b257-b250-softupdate-l14-screen
hypothesis: >-
  B250's successful seeds converged with low KL while failed seeds stayed in weaker local behavior.
  Slightly lower learning rate, clip range, and target KL test whether softer policy updates improve
  cross-seed retention without changing reward semantics. Seed 90 should reach 100/100 with a smoother
  KL/clip tail and no loss of sample efficiency large enough to threaten the 5M cap.
parent_spec_slug: b250-b55post21-l14-screen
seeds:
- 90
run_target: rtx4090
state: Level1-4
wandb_group: b257-l14-b250-softupdate-screen
wandb_tags:
- mario
- level1-4
- world1-4
- post21
- b257
- b250
- soft-update
- target-kl-010
- clip-012
- no-completion-bonus
- screen
