schema_version: 1
goal: Level1-4
slug: b251-b55complete100-l14-screen
stage: screen
hypothesis: A modest clean-completion reward should reinforce true World 1-4 clears once discovered without changing the task, emulator state, action space, observation semantics, or eval protocol.
expected_signal: Seed 90 should improve first nonzero train/info/level_complete/from/0-3/count or peak train/info/level_complete/from/0-3/rate versus the no-bonus B250 arm, while reward-share diagnostics show the completion bonus does not swamp real progress learning.
parent_spec_slug: b250-b55post21-l14-screen
priority: 69
seeds:
- 90
run_target: rtx4090
wandb_group: b251-l14-b55complete100-screen
wandb_tags:
- mario
- level1-4
- world1-4
- post21
- b251
- b55-transfer
- completion-reward-100
- low-update-pressure
- screen
- beast3
run_name_template: b251_l14_b55complete100_s{seed}_{utc}
run_description_template: Single-seed Beast3 scratch screen for World 1-4 100/100, seed {seed}; B55/B250 low-KL recipe plus clean completion_reward=100. Primary metric is peak train/info/level_complete/rate/min/last, matching train/info/level_complete/from/0-3/rate once the source window is full; stop early when train/info/level_complete/rate/min/last > 0.99.
selection_gate:
  primary: max(train/info/level_complete/rate/min/last)
  primary_metric_note: For this single-source Level1-4 screen, the primary metric should match train/info/level_complete/from/0-3/rate once the rolling source window is full; out-of-process eval remains required before promotion.
  threshold: 1.0
  tie_breakers:
  - max(train/info/level_complete/rate/mean/last)
  - eval/done/level_change/from/Level1-4/rate
  - eval/progress/x/max
  - eval/reward/mean
  training_metrics: primary_optimization_signal
train_config:
  game: SuperMarioBros-Nes-v0
  state: Level1-4
  n_envs: 16
  env_threads: 4
  torch_num_threads: 1
  n_steps: 512
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.00015
  learning_rate_final: 0.0001
  learning_rate_schedule_timesteps: 4000000
  ent_coef: 0.01
  ent_coef_final: 0.0001
  ent_coef_schedule_timesteps: 4000000
  gamma: 0.9
  gae_lambda: 1.0
  clip_range: 0.15
  target_kl: 0.16
  vf_coef: 1.0
  adam_eps: 1.0e-08
  normalize_advantage: false
  reward_mode: score
  progress_reward_cap: 30.0
  progress_reward_scale: 1.0
  terminal_reward: 50
  time_penalty: 0.0
  death_penalty: 25
  completion_reward: 100
  reward_scale: 10
  score_progress_clipped: false
  no_progress_timeout_steps: 0
  no_progress_min_delta: 0
  action_set: simple
  frame_skip: 4
  max_pool_frames: false
  hud_crop_top: 32
  max_episode_steps: 4500
  completion_x_threshold: 0
  info_events_json:
    life_loss:
    - lives
    - decrease
    level_change:
    - - levelHi
      - levelLo
    - change
  done_on_events: life_loss,level_change
  eval_freq: 0
  eval_episodes: 0
  checkpoint_freq: 500000
  early_stop_metric: train/info/level_complete/rate/min/last
  early_stop_threshold: 0.99
  early_stop_operator: '>'
  timesteps: 5000000
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: ${CHECKPOINT_BUCKET_URI}
