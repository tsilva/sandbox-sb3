schema_version: 1
name: eval-contract-mario-l11
kind: eval_contract
description: Out-of-process eval metadata reconstruction check for a Mario Level1-1 checkpoint artifact.
game: SuperMarioBros-Nes-v0
artifact_ref: <entity/project/run-checkpoint:latest>
episodes: 5
max_steps: 4500
record_best_video: false
gates:
  exit_code: 0
  required_metrics:
  - eval/done/level_change/rate
  - eval/progress/x/max
  - eval/reward/mean
  metadata_reconstructed: true
